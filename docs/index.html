<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#111827">
  <title>BetBoom Monitor</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <main id="app">
    <header class="topbar">
      <div>
        <div class="eyebrow">BetBoom Monitor</div>
        <h1>Колёса и статистика</h1>
      </div>
      <button id="refreshBtn" class="icon-btn" aria-label="Обновить">↻</button>
    </header>

    <section id="status" class="status-card">Загрузка данных…</section>

    <nav class="tabs" aria-label="Разделы">
      <button class="tab active" data-tab="wheels">Колёса</button>
      <button class="tab" data-tab="stats">Статистика</button>
      <button class="tab" data-tab="sources">Источники</button>
      <button class="tab" data-tab="ranking">Рейтинг</button>
    </nav>

    <section id="wheels" class="panel active"></section>
    <section id="stats" class="panel"></section>
    <section id="sources" class="panel"></section>
    <section id="ranking" class="panel"></section>
  </main>
  <script src="app.js"></script>
</body>
</html>
