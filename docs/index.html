<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#0a0a0c">
  <meta name="color-scheme" content="dark">
  <meta name="description" content="BetBoom Monitor — актуальные колёса, статистика и источники">
  <title>BetBoom Monitor</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css?v=3.0.0">
  <script src="https://telegram.org/js/telegram-web-app.js?62"></script>
  <script src="runtime-config.js?v=3.0.0"></script>
</head>
<body>
  <div id="splash" class="splash" aria-label="Загрузка приложения">
    <div class="splash-shade"></div>
    <div class="splash-copy">
      <strong>BetBoom Monitor</strong>
      <span>Загружаем актуальные колёса</span>
      <i></i>
    </div>
  </div>

  <div id="app" class="app-shell" hidden>
    <header class="app-header">
      <button class="brand" type="button" data-route="home" aria-label="На главную">
        <img src="icon.svg" alt="">
        <span><strong>BetBoom Monitor</strong><small id="headerSubtitle">Актуальные колёса</small></span>
      </button>
      <button id="refreshButton" class="icon-button" type="button" aria-label="Обновить">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 11a8 8 0 1 0 2 5.3M20 4v7h-7"/></svg>
      </button>
    </header>

    <main class="page-wrap">
      <section id="page-home" class="page active" data-page="home"></section>
      <section id="page-stats" class="page" data-page="stats"></section>
      <section id="page-sources" class="page" data-page="sources"></section>
      <section id="page-profile" class="page" data-page="profile"></section>
    </main>

    <nav class="bottom-nav" aria-label="Навигация приложения">
      <button class="nav-item active" type="button" data-route="home">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 10.8 12 3l9 7.8v9.7a.5.5 0 0 1-.5.5H15v-6H9v6H3.5a.5.5 0 0 1-.5-.5z"/></svg>
        <span>Главная</span>
      </button>
      <button class="nav-item" type="button" data-route="stats">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 20V10m7 10V4m7 16v-7"/></svg>
        <span>Статистика</span>
      </button>
      <button class="nav-item" type="button" data-route="sources">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="2"/><path d="M7.8 7.8a6 6 0 0 0 0 8.4m8.4-8.4a6 6 0 0 1 0 8.4M4.3 4.3a11 11 0 0 0 0 15.4m15.4-15.4a11 11 0 0 1 0 15.4"/></svg>
        <span>Источники</span>
      </button>
      <button class="nav-item" type="button" data-route="profile">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M4.5 21a7.5 7.5 0 0 1 15 0"/></svg>
        <span>Профиль</span>
      </button>
    </nav>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <dialog id="dialog" class="dialog"><button class="dialog-close" type="button" data-action="close-dialog" aria-label="Закрыть">×</button><div id="dialogBody"></div></dialog>
  <script src="app.js?v=3.0.0"></script>
</body>
</html>
