name: Apply final xFLARXx cleanup to main

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/apply-xflarxx-main-final.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TEMP_WORKFLOW: .github/workflows/apply-xflarxx-main-final.yml
      SCRIPT_BRANCH: feature/xflarxx-account-access-cleanup-final
    steps:
      - name: Checkout current main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Apply final changes
        shell: bash
        run: |
          set +e
          exec > >(tee /tmp/xflarxx-main-final.txt) 2>&1
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          stage="fetch-scripts"
          git fetch origin "$SCRIPT_BRANCH"
          code=$?
          if [[ "$code" == 0 ]]; then
            git show "origin/${SCRIPT_BRANCH}:scripts/apply_xflarxx_account_access_cleanup.py" > /tmp/apply_xflarxx.py
            code=$?
          fi
          if [[ "$code" == 0 ]]; then
            git show "origin/${SCRIPT_BRANCH}:scripts/finalize_xflarxx_account_access_cleanup.py" > /tmp/finalize_xflarxx.py
            code=$?
          fi
          if [[ "$code" == 0 ]]; then
            stage="prepare-workflow"
            python - <<'PY'
          from pathlib import Path

          workflow_path = Path('.github/workflows/auto-participation.yml')
          workflow = workflow_path.read_text(encoding='utf-8')

          validation_marker = '''          BETBOOM_STORAGE_STATE_JSON_PART3: ${{ secrets.BETBOOM_STORAGE_STATE_JSON_PART3 }}
          BETBOOM_STORAGE_STATE_JSON_PART4: ${{ secrets.BETBOOM_STORAGE_STATE_JSON_PART4 }}
          BETBOOM_ACCOUNT2_LABEL: "Аккаунт 2"
'''
          validation_replacement = '''          BETBOOM_STORAGE_STATE_JSON_PART3: ${{ secrets.BETBOOM_STORAGE_STATE_JSON_PART3 }}
          BETBOOM_STORAGE_STATE_JSON_PART4: ${{ secrets.BETBOOM_STORAGE_STATE_JSON_PART4 }}
          BETBOOM_STORAGE_STATE_JSON_PART5: ${{ secrets.BETBOOM_STORAGE_STATE_JSON_PART5 }}
          BETBOOM_STORAGE_STATE_JSON_PART6: ${{ secrets.BETBOOM_STORAGE_STATE_JSON_PART6 }}
          BETBOOM_ACCOUNT2_LABEL: "Аккаунт 2"
'''
          if workflow.count(validation_marker) != 1:
              raise SystemExit(f'validation environment marker count={workflow.count(validation_marker)}')
          workflow = workflow.replace(validation_marker, validation_replacement, 1)

          preflight_marker = '''          if not betboom_account_participation.configured():
              raise SystemExit("Vyacheslav second BetBoom session PART3/PART4 is not configured")
'''
          preflight_replacement = preflight_marker + '''          if not betboom_account_participation.xflarxx_configured():
              raise SystemExit("xFLARXx BetBoom session PART5/PART6 is not configured")
'''
          if workflow.count(preflight_marker) != 1:
              raise SystemExit(f'preflight marker count={workflow.count(preflight_marker)}')
          workflow = workflow.replace(preflight_marker, preflight_replacement, 1)

          old_message = '          print("Auto participation preflight OK for both BetBoom accounts")\n'
          new_message = '          print("Auto participation preflight OK for all configured BetBoom accounts")\n'
          if workflow.count(old_message) != 1:
              raise SystemExit(f'preflight message count={workflow.count(old_message)}')
          workflow = workflow.replace(old_message, new_message, 1)

          old_step = '      - name: Run second BetBoom account for Vyacheslav\n'
          new_step = '      - name: Run additional BetBoom accounts\n'
          if workflow.count(old_step) != 1:
              raise SystemExit(f'additional account step count={workflow.count(old_step)}')
          workflow = workflow.replace(old_step, new_step, 1)

          runtime_marker = '''          BETBOOM_STORAGE_STATE_JSON_PART3: ${{ secrets.BETBOOM_STORAGE_STATE_JSON_PART3 }}
          BETBOOM_STORAGE_STATE_JSON_PART4: ${{ secrets.BETBOOM_STORAGE_STATE_JSON_PART4 }}
          BETBOOM_ACCOUNT2_LABEL: "Аккаунт 2"
          BETBOOM_ACCOUNT2_TELEGRAM_USER: "Вячеслав"
'''
          runtime_replacement = '''          BETBOOM_STORAGE_STATE_JSON_PART3: ${{ secrets.BETBOOM_STORAGE_STATE_JSON_PART3 }}
          BETBOOM_STORAGE_STATE_JSON_PART4: ${{ secrets.BETBOOM_STORAGE_STATE_JSON_PART4 }}
          BETBOOM_STORAGE_STATE_JSON_PART5: ${{ secrets.BETBOOM_STORAGE_STATE_JSON_PART5 }}
          BETBOOM_STORAGE_STATE_JSON_PART6: ${{ secrets.BETBOOM_STORAGE_STATE_JSON_PART6 }}
          BETBOOM_ACCOUNT2_LABEL: "Аккаунт 2"
          BETBOOM_ACCOUNT2_TELEGRAM_USER: "Вячеслав"
          BETBOOM_ACCOUNT3_LABEL: "xFLARXx"
          BETBOOM_ACCOUNT3_TELEGRAM_USER: "xFLARXx"
'''
          if workflow.count(runtime_marker) != 1:
              raise SystemExit(f'additional account environment marker count={workflow.count(runtime_marker)}')
          workflow = workflow.replace(runtime_marker, runtime_replacement, 1)
          workflow_path.write_text(workflow, encoding='utf-8')

          installer_path = Path('/tmp/apply_xflarxx.py')
          installer = installer_path.read_text(encoding='utf-8')
          start = installer.find('# 2. Run PART5/PART6 in the normal serialized auto-participation workflow.')
          end = installer.find('# 3. Fix the TypeError in owner user details', start)
          if start < 0 or end < 0:
              raise SystemExit('installer workflow section boundaries not found')
          installer_path.write_text(installer[:start] + installer[end:], encoding='utf-8')
          PY
            code=$?
          fi
          if [[ "$code" == 0 ]]; then stage="apply"; python /tmp/apply_xflarxx.py; code=$?; fi
          if [[ "$code" == 0 ]]; then stage="finalize"; python /tmp/finalize_xflarxx.py; code=$?; fi
          if [[ "$code" == 0 ]]; then
            stage="compile"
            rm -f "$TEMP_WORKFLOW" xflarxx_final_failure.txt xflarxx_main_failure.txt
            python -m py_compile betboom_account_participation.py auto_participation_notifications.py notification_button_recovery.py bbvg/bot/runtime.py tests/test_button_matrix.py
            code=$?
          fi
          if [[ "$code" != 0 ]]; then
            echo "FAILED_STAGE=${stage}" | tee -a /tmp/xflarxx-main-final.txt
            git reset --hard HEAD
            rm -f "$TEMP_WORKFLOW"
            cp /tmp/xflarxx-main-final.txt xflarxx_main_failure.txt
            git add -f xflarxx_main_failure.txt "$TEMP_WORKFLOW"
            git commit -m "Record final xFLARXx main failure at ${stage} [skip ci]" || true
          else
            git add -A
            git commit -m "Подключить xFLARXx и исправить управление пользователями"
          fi
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              if [[ "$code" == 0 ]]; then
                git push origin --delete fix/control-center-unified-notification-release || true
              fi
              exit "$code"
            fi
            git pull --rebase origin main
            sleep $((attempt * 2))
          done
          exit 1
