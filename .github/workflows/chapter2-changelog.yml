name: Record chapter 2 verification

on:
  push:
    branches:
      - agent/chapter2-actions-hardening

permissions:
  contents: write

jobs:
  record:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: agent/chapter2-actions-hardening
          fetch-depth: 0
      - name: Record successful PR checks
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('docs/PROJECT_CHANGELOG_RU.md')
          text = path.read_text(encoding='utf-8')
          old = '**Проверки до PR:** YAML parse всех workflow, `py_compile`, `backup_rotation.py --self-test`, `monitor_health.py --self-test`, shell syntax и профильный pytest-контракт проходят. Полные PR runs, production acceptance, live heartbeat и post-update backup фиксируются после deploy.'
          new = '**Проверки:** до PR прошли YAML parse всех workflow, `py_compile`, `backup_rotation.py --self-test`, `monitor_health.py --self-test`, shell syntax и профильный pytest-контракт. На final head PR №48 успешны runs `29579368810`, `29579368732`, `29579368716`, `29579368718`, `29579368737` и rotation-contract `29579368709`; полный pytest и production acceptance входят в обязательный current-check. Live heartbeat и post-update backup проверяются после merge.'
          if old not in text:
              raise SystemExit('Chapter 2 verification placeholder not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/PROJECT_CHANGELOG_RU.md
          git commit -m "Record chapter 2 PR verification"
          git push origin HEAD:agent/chapter2-actions-hardening
