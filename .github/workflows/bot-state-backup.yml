name: Backup encrypted bot state
run-name: Backup encrypted bot state - ${{ github.event_name }}

on:
  create:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed
    paths:
      - ".github/workflows/bot-state-backup.yml"
      - "bot_private_state.enc.json"
      - "bot_private_state.py"
  push:
    branches:
      - "backup/**"
  workflow_dispatch:
  schedule:
    - cron: "42 2 * * *"

permissions:
  contents: read

concurrency:
  group: bb-vg-bot-state-backup
  cancel-in-progress: false

jobs:
  backup:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'pull_request' &&
      github.event.action != 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.head_ref, 'chapter1-'))
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout exact authoritative state
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || 'main' }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Verify encrypted state and write non-PII metadata
        env:
          BOT_STATE_KEY: ${{ secrets.BOT_STATE_KEY }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib
          import hmac
          import json
          import os
          import subprocess
          from datetime import datetime, timezone

          import bot_private_state

          production_key = str(os.environ.get("BOT_STATE_KEY") or "").strip()
          assert production_key, "BOT_STATE_KEY is required for a verified production backup"

          text = bot_private_state.STATE_PATH.read_text(encoding="utf-8")
          source_sha = subprocess.check_output(
              ["git", "rev-parse", "HEAD"],
              text=True,
          ).strip()
          assert len(source_sha) == 40, "Unable to resolve exact source SHA"
          assert bot_private_state.state_format(text) == bot_private_state.FORMAT_V2
          assert bot_private_state.state_key_mode(text) == "dedicated"

          value = bot_private_state.unseal(text, secret=production_key)
          access = value.get("access") if isinstance(value.get("access"), dict) else {}
          users = access.get("users") if isinstance(access.get("users"), dict) else {}
          admins = access.get("admins") if isinstance(access.get("admins"), list) else []
          recipients = (
              access.get("notification_recipients")
              if isinstance(access.get("notification_recipients"), list)
              else []
          )
          requests_bundle = (
              value.get("source_requests")
              if isinstance(value.get("source_requests"), dict)
              else {}
          )
          requests = (
              requests_bundle.get("requests")
              if isinstance(requests_bundle.get("requests"), dict)
              else {}
          )
          assert access.get("owner_id"), "Encrypted state has no owner"
          assert users, "Encrypted state has no users"

          canonical = json.dumps(
              value,
              ensure_ascii=False,
              separators=(",", ":"),
              sort_keys=True,
          ).encode("utf-8")
          encrypted_bytes = bot_private_state.STATE_PATH.read_bytes()
          state_hmac = hmac.new(
              production_key.encode("utf-8"),
              b"bbvg-backup-state-v1\0" + canonical,
              hashlib.sha256,
          ).hexdigest()

          restored = bot_private_state.unseal(
              bot_private_state.seal(value, secret=production_key),
              secret=production_key,
          )
          assert restored == value, "Encrypted restore smoke mismatch"

          metadata = {
              "schema": "bbvg-encrypted-backup-metadata-v2",
              "repository": os.environ["GITHUB_REPOSITORY"],
              "source_ref": "refs/heads/main",
              "source_sha": source_sha,
              "encrypted_sha256": hashlib.sha256(encrypted_bytes).hexdigest(),
              "state_hmac_sha256": state_hmac,
              "format": bot_private_state.state_format(text),
              "key_mode": "dedicated_current_production_key",
              "verified_decrypt": True,
              "verified_restore_smoke": True,
              "artifact_outside_public_git_refs": True,
              "aggregates": {
                  "owner_present": True,
                  "user_count": len(users),
                  "admin_count": len(set(map(str, admins))),
                  "notification_recipient_count": len(set(map(str, recipients))),
                  "source_request_count": len(requests),
                  "bundle_version": value.get("version"),
              },
              "generated_at": datetime.now(timezone.utc).isoformat(),
          }
          with open("bot_state_backup_metadata.json", "w", encoding="utf-8") as stream:
              json.dump(metadata, stream, ensure_ascii=False, indent=2, sort_keys=True)
              stream.write("\n")
          print(
              "Verified encrypted state backup: "
              f"source_sha={source_sha}, format={metadata['format']}, "
              f"users={metadata['aggregates']['user_count']}, "
              "restore_smoke=true"
          )
          PY

      - name: Upload verified encrypted backup
        uses: actions/upload-artifact@v4
        with:
          name: bbvg-encrypted-state-${{ github.run_id }}
          path: |
            bot_private_state.enc.json
            bot_state_backup_metadata.json
          if-no-files-found: error
          retention-days: 30

  rotate-backup-branches:
    if: >-
      (github.event_name == 'create' &&
      github.event.ref_type == 'branch' &&
      startsWith(github.event.ref, 'backup/')) ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true) ||
      (github.event_name == 'push' &&
      github.event.created &&
      startsWith(github.ref, 'refs/heads/backup/'))
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
      CREATED_BACKUP_REF: ${{ github.event_name == 'create' && github.event.ref || (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/backup/') && github.ref_name || '') }}
      KEEP_BACKUPS: "3"

    steps:
      - name: Verify new backup and retain only the newest three
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.parse
          import urllib.request

          token = os.environ["GH_TOKEN"]
          repository = os.environ["REPOSITORY"]
          created_ref = os.environ.get("CREATED_BACKUP_REF", "").strip()
          keep_count = int(os.environ["KEEP_BACKUPS"])
          api_root = f"https://api.github.com/repos/{repository}"

          if keep_count != 3:
              raise SystemExit("KEEP_BACKUPS must remain exactly 3")
          if created_ref and (
              not created_ref.startswith("backup/") or created_ref == "backup/"
          ):
              raise SystemExit(f"Unsafe backup ref: {created_ref!r}")

          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "User-Agent": "bbvg-backup-retention",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          def request(method, path):
              req = urllib.request.Request(api_root + path, headers=headers, method=method)
              try:
                  with urllib.request.urlopen(req, timeout=30) as response:
                      body = response.read()
              except urllib.error.HTTPError as exc:
                  detail = exc.read().decode("utf-8", errors="replace")
                  raise RuntimeError(
                      f"GitHub API {method} {path} failed: HTTP {exc.code}: {detail}"
                  ) from exc
              return json.loads(body) if body else None

          def ref_path(short_name):
              return "/git/ref/heads/" + urllib.parse.quote(short_name, safe="/")

          def delete_ref_path(short_name):
              return "/git/refs/heads/" + urllib.parse.quote(short_name, safe="/")

          def list_backup_refs():
              refs = []
              page = 1
              while True:
                  batch = request(
                      "GET",
                      f"/git/matching-refs/heads/backup/?per_page=100&page={page}",
                  )
                  refs.extend(batch)
                  if len(batch) < 100:
                      return refs
                  page += 1

          repository_info = request("GET", "")
          default_branch = repository_info["default_branch"]
          default_ref = request("GET", ref_path(default_branch))
          default_sha = default_ref["object"]["sha"]

          refs = list_backup_refs()
          if len(refs) > 50:
              raise SystemExit(f"Refusing unexpected backup ref count: {len(refs)}")

          commit_cache = {}
          records = []
          for ref in refs:
              full_name = ref["ref"]
              prefix = "refs/heads/"
              if not full_name.startswith(prefix + "backup/"):
                  raise SystemExit(f"Unexpected ref outside backup namespace: {full_name}")
              short_name = full_name[len(prefix):]
              sha = ref["object"]["sha"]
              commit = commit_cache.get(sha)
              if commit is None:
                  commit = request("GET", f"/commits/{sha}")
                  commit_cache[sha] = commit
              records.append(
                  {
                      "name": short_name,
                      "sha": sha,
                      "committed_at": commit["commit"]["committer"]["date"],
                      "is_created_ref": False,
                  }
              )

          if not records:
              print("No backup refs exist; nothing to rotate")
              raise SystemExit(0)

          if not created_ref:
              created_ref = max(
                  records,
                  key=lambda record: (record["committed_at"], record["name"]),
              )["name"]
              print(f"Maintenance run selected newest backup: {created_ref}")

          selected = None
          for record in records:
              record["is_created_ref"] = record["name"] == created_ref
              if record["is_created_ref"]:
                  selected = record
          if selected is None:
              raise SystemExit("Selected backup ref is missing from repository inventory")

          new_compare = request("GET", f"/compare/{selected['sha']}...{default_sha}")
          if new_compare["status"] not in {"ahead", "identical"}:
              raise SystemExit(
                  f"New backup is not an ancestor of {default_branch}: "
                  f"status={new_compare['status']}"
              )
          if new_compare["merge_base_commit"]["sha"] != selected["sha"]:
              raise SystemExit("New backup ancestry verification failed")

          records.sort(
              key=lambda record: (
                  record["is_created_ref"],
                  record["committed_at"],
                  record["name"],
              ),
              reverse=True,
          )
          retained = records[:keep_count]
          obsolete = records[keep_count:]

          for record in obsolete:
              compare = request("GET", f"/compare/{record['sha']}...{default_sha}")
              if compare["status"] not in {"ahead", "identical"}:
                  raise SystemExit(
                      f"Refusing to delete {record['name']}: "
                      f"status={compare['status']}"
                  )
              if compare["merge_base_commit"]["sha"] != record["sha"]:
                  raise SystemExit(
                      f"Refusing to delete {record['name']}: it has unique commits"
                  )

          print("Retaining verified backup refs:")
          for record in retained:
              print(f"  KEEP {record['name']} {record['sha']} {record['committed_at']}")
          print("Deleting obsolete backup refs:")
          for record in obsolete:
              print(f"  DELETE {record['name']} {record['sha']} {record['committed_at']}")

          for record in obsolete:
              request("DELETE", delete_ref_path(record["name"]))

          remaining = list_backup_refs()
          remaining_names = sorted(
              ref["ref"].removeprefix("refs/heads/") for ref in remaining
          )
          expected_names = sorted(record["name"] for record in retained)
          if remaining_names != expected_names:
              raise SystemExit(
                  "Post-rotation inventory mismatch: "
                  f"expected={expected_names}, actual={remaining_names}"
              )
          if len(remaining_names) != min(len(records), keep_count):
              raise SystemExit("Post-rotation backup count is invalid")
          if created_ref not in remaining_names:
              raise SystemExit("Newly created backup was not retained")

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as summary:
                  summary.write("## Backup branch rotation\n\n")
                  summary.write(f"Retained: {len(retained)}; deleted: {len(obsolete)}.\n\n")
                  summary.write("### Retained\n")
                  for record in retained:
                      summary.write(f"- `{record['name']}` at `{record['sha']}`\n")
                  summary.write("\n### Deleted\n")
                  if obsolete:
                      for record in obsolete:
                          summary.write(f"- `{record['name']}` at `{record['sha']}`\n")
                  else:
                      summary.write("- None\n")

          print(f"Backup rotation complete: {remaining_names}")
          PY
