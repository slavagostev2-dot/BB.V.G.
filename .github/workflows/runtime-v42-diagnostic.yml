name: Runtime v42 deployment diagnostics

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BOT_TOKEN: test-bot-token
      BOT_STATE_KEY: test-state-key
      BOT_CHAT_ID: "1"
      ADMIN_USER_ID: "1"
      BBVG_TEST_MODE: "1"
      TELEGRAM_WEB_DOMAIN: telegram.me
      UNKNOWN_DEDUP_HOURS: "2"
      EXPECTED_SOURCE_COUNT: "77"
      FINAL_REMINDER_BEFORE_MINUTES: "5"
      ACTIVE_REMOVE_GRACE_MINUTES: "0"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then python -m pip install -r requirements-dev.txt; fi

      - name: Full pytest
        id: pytest
        continue-on-error: true
        run: python -m pytest -q

      - name: Production acceptance
        id: acceptance
        continue-on-error: true
        run: python tests/production_acceptance.py --section all

      - name: Runtime v25 self-test
        id: v25
        continue-on-error: true
        run: python admin_panel_runtime_v25.py --self-test
      - name: Runtime v26 self-test
        id: v26
        continue-on-error: true
        run: python admin_panel_runtime_v26.py --self-test
      - name: Runtime v28 self-test
        id: v28
        continue-on-error: true
        run: python admin_panel_runtime_v28.py --self-test
      - name: Runtime v29 self-test
        id: v29
        continue-on-error: true
        run: python admin_panel_runtime_v29.py --self-test
      - name: Runtime v30 self-test
        id: v30
        continue-on-error: true
        run: python admin_panel_runtime_v30.py --self-test
      - name: Runtime v31 self-test
        id: v31
        continue-on-error: true
        run: python admin_panel_runtime_v31.py --self-test
      - name: Runtime v32 self-test
        id: v32
        continue-on-error: true
        run: python admin_panel_runtime_v32.py --self-test
      - name: Runtime v36 self-test
        id: v36
        continue-on-error: true
        run: python admin_panel_runtime_v36.py --self-test
      - name: Runtime v37 self-test
        id: v37
        continue-on-error: true
        run: python admin_panel_runtime_v37.py --self-test
      - name: Runtime v38 self-test
        id: v38
        continue-on-error: true
        run: python admin_panel_runtime_v38.py --self-test
      - name: Runtime v41 self-test
        id: v41
        continue-on-error: true
        run: python admin_panel_runtime_v41.py --self-test

      - name: Domain recovery self-tests
        id: domain
        continue-on-error: true
        run: |
          python recurring_wheel_events.py
          python wheel_event_runtime.py
          python wheel_metadata_quality.py
          python wheel_publications_v2.py
          python wheel_lifecycle_v2.py
          python wheel_link_lifecycle.py
          python wheel_scenario_suite.py
          python personal_reminder_filter.py
          python source_intelligence_alerts.py
          python -c "import daily_report; daily_report.self_test()"
          python admin_action_v2.py --self-test
          python admin_action_v3.py --self-test
          python system_checks_v2.py --self-test
          python source_tier_maintenance_v2.py --self-test

      - name: Require all diagnostics
        env:
          PYTEST: ${{ steps.pytest.outcome }}
          ACCEPTANCE: ${{ steps.acceptance.outcome }}
          V25: ${{ steps.v25.outcome }}
          V26: ${{ steps.v26.outcome }}
          V28: ${{ steps.v28.outcome }}
          V29: ${{ steps.v29.outcome }}
          V30: ${{ steps.v30.outcome }}
          V31: ${{ steps.v31.outcome }}
          V32: ${{ steps.v32.outcome }}
          V36: ${{ steps.v36.outcome }}
          V37: ${{ steps.v37.outcome }}
          V38: ${{ steps.v38.outcome }}
          V41: ${{ steps.v41.outcome }}
          DOMAIN: ${{ steps.domain.outcome }}
        run: |
          printf '%s\n' "pytest=$PYTEST" "acceptance=$ACCEPTANCE" "v25=$V25" "v26=$V26" "v28=$V28" "v29=$V29" "v30=$V30" "v31=$V31" "v32=$V32" "v36=$V36" "v37=$V37" "v38=$V38" "v41=$V41" "domain=$DOMAIN"
          test "$PYTEST" = success
          test "$ACCEPTANCE" = success
          test "$V25" = success
          test "$V26" = success
          test "$V28" = success
          test "$V29" = success
          test "$V30" = success
          test "$V31" = success
          test "$V32" = success
          test "$V36" = success
          test "$V37" = success
          test "$V38" = success
          test "$V41" = success
          test "$DOMAIN" = success
