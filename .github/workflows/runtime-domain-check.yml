name: Runtime domain command checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  commands:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      BOT_TOKEN: test-bot-token
      BOT_STATE_KEY: test-state-key
      BOT_CHAT_ID: "1"
      ADMIN_USER_ID: "1"
      BBVG_TEST_MODE: "1"
      TELEGRAM_WEB_DOMAIN: telegram.me
      UNKNOWN_DEDUP_HOURS: "2"
      EXPECTED_SOURCE_COUNT: "77"
      FINAL_REMINDER_BEFORE_MINUTES: "5"
      ACTIVE_REMOVE_GRACE_MINUTES: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r requirements.txt
      - name: recurring wheel events
        run: python recurring_wheel_events.py
      - name: wheel event runtime
        run: python wheel_event_runtime.py
      - name: wheel metadata quality
        run: python wheel_metadata_quality.py
      - name: wheel publications
        run: python wheel_publications_v2.py
      - name: wheel lifecycle
        run: python wheel_lifecycle_v2.py
      - name: wheel link lifecycle
        run: python wheel_link_lifecycle.py
      - name: wheel scenario suite
        run: python wheel_scenario_suite.py
      - name: personal reminder filter
        run: python personal_reminder_filter.py
      - name: source intelligence alerts
        run: python source_intelligence_alerts.py
      - name: daily report
        run: python -c "import daily_report; daily_report.self_test()"
      - name: admin action v2
        run: python admin_action_v2.py --self-test
      - name: admin action v3
        run: python admin_action_v3.py --self-test
      - name: system checks v2
        run: python system_checks_v2.py --self-test
      - name: source tier maintenance
        run: python source_tier_maintenance_v2.py --self-test
