name: Get Telegram chat ID

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  get-chat-id:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requests
        run: python -m pip install requests==2.32.4

      - name: Show chat IDs
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: python get_chat_id.py
