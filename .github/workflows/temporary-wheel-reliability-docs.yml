name: Temporary wheel reliability docs

on:
  push:
    branches:
      - fix/early-source-dedup-auto-label

permissions:
  contents: write

jobs:
  patch-docs:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/early-source-dedup-auto-label
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Update required repository documentation
        run: |
          python - <<'PY'
          from pathlib import Path

          changelog = Path('docs/PROJECT_CHANGELOG_RU.md')
          text = changelog.read_text(encoding='utf-8')
          heading = '## 2026-07-23 — Восстановлено раннее обнаружение авторских публикаций'
          entry = '''## 2026-07-23 — Восстановлено раннее обнаружение авторских публикаций

Инцидент `zonertg14` показал, что короткое публичное окно Telegram может не содержать ранний пост основного канала `@mechanogun`, а поздняя публикация канала-сборника `@amam0610` тогда ошибочно становится первой найденной. Для сопоставленных авторских каналов добавлено одно перекрывающее чтение предыдущей страницы Telegram по параметру `before`; сборники этим запросом не нагружаются, а повтор ограничен минутным cooldown. Благодаря этому канонический источник и исходное время выбираются до дедупликации и отправки уведомления.

Заголовок первичного сообщения изменён с утверждения «Новое колесо» на нейтральное «Обнаружено колесо». Автоматически подтверждённое участие теперь подписывается «🤖 Автоучастие подтверждено» как при создании карточки, так и при последующем обновлении Control Center; ручная отметка остаётся отдельным состоянием. Агрегация двух BetBoom-аккаунтов, бесшумные отрицательные итоги реферальных колёс и пользовательская настройка уведомлений автоучастия не изменены.

**Новый предметный модуль:** `wheel_detection_reliability.py` владеет ограниченным перекрывающим чтением авторских источников и ясностью статуса участия в карточке. Он не создаёт новый runtime, consumer Telegram или отдельный путь пользовательской доставки.

**Изменённые файлы:** `telegram_post_links_v2.py`, `wheel_detection_reliability.py`, `tests/test_wheel_detection_reliability.py`, `AGENTS.md`, `docs/PROJECT_CHANGELOG_RU.md`.

**Pre-update backup:** `backup/2026-07-23-before-wheel-detection-reliability` → `884d20c9d83f5707bb88c7c3ec36331627ed27db`.

'''
          if heading not in text:
              text = text.replace('---\n\n', '---\n\n' + entry, 1)
              changelog.write_text(text, encoding='utf-8')

          agents = Path('AGENTS.md')
          text = agents.read_text(encoding='utf-8')
          old_monitor = '- Монитор колёс: `bbvg_monitor_main.py`, `monitor.py` и тематические модули.'
          new_monitor = old_monitor + ' `wheel_detection_reliability.py` выполняет ограниченное перекрывающее чтение предыдущей публичной страницы только для сопоставленных авторских каналов, чтобы короткое окно Telegram не отдавало приоритет позднему дублю сборника.'
          if old_monitor in text and 'ограниченное перекрывающее чтение предыдущей публичной страницы' not in text:
              text = text.replace(old_monitor, new_monitor, 1)
          text = text.replace(
              'После успеха Control Center переводит кнопку в состояние «✅ Участвую».',
              'После успеха Control Center переводит кнопку в состояние «🤖 Автоучастие подтверждено», чтобы автоматическая отметка не выглядела ручным нажатием.',
          )
          agents.write_text(text, encoding='utf-8')
          PY
      - name: Commit documentation
        run: |
          if git diff --quiet -- AGENTS.md docs/PROJECT_CHANGELOG_RU.md; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add AGENTS.md docs/PROJECT_CHANGELOG_RU.md
          git commit -m "Document creator overlap and automatic participation label"
          git push origin HEAD:fix/early-source-dedup-auto-label

# Triggered after workflow registration so GitHub schedules the documentation patch.
