name: Nightly source discovery

on:
  workflow_dispatch:
  schedule:
    # 20:25 UTC = 03:25 in Barnaul (UTC+7).
    - cron: "25 20 * * *"

permissions:
  contents: write

concurrency:
  group: betboom-wheel-monitor
  cancel-in-progress: false

jobs:
  discovery:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Scan full source catalog
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          DISPLAY_TIMEZONE: Asia/Barnaul
          REQUEST_TIMEOUT_SECONDS: "15"
          DISCOVERY_LOOKBACK_HOURS: "36"
          DISCOVERY_PAGES: "4"
        run: python nightly_discovery.py

      - name: Save discovery results
        shell: bash
        run: |
          if git diff --quiet -- public_sources.txt known_freestream_ids.txt state.json discovery_state.json; then
            echo "Discovery state did not change."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public_sources.txt known_freestream_ids.txt state.json discovery_state.json
          git commit -m "Update nightly source discovery [skip ci]"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
