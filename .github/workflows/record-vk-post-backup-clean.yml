name: Record VK post-update backup clean

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/record-vk-post-backup-clean.yml"

permissions:
  contents: write

jobs:
  record:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout documentation branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: docs/record-vk-post-backup-clean
          fetch-depth: 0
      - name: Add verified post-update backup to changelog
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("docs/PROJECT_CHANGELOG_RU.md")
          text = path.read_text(encoding="utf-8")
          pre = "**Pre-update backup:** `backup/before-direct-vk-wheel-delivery-2026-07-21` → `7d435b7efc7f74c9dd7731337f351a96d6b228d9`."
          post = "**Post-update backup:** `backup/2026-07-21-after-direct-vk-wheel-delivery` → `126f242c5f2cc3462fd2eb6def03e0a9e1a215ca`."
          if post not in text:
              if pre not in text:
                  raise SystemExit("VK backup anchor not found")
              text = text.replace(pre, pre + "\n\n" + post, 1)
              path.write_text(text, encoding="utf-8")
          PY
          if git diff --quiet -- docs/PROJECT_CHANGELOG_RU.md; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/PROJECT_CHANGELOG_RU.md
          git commit -m "Record verified VK post-update backup"
          git push origin HEAD:docs/record-vk-post-backup-clean
