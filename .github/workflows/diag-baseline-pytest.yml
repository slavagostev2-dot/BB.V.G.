name: Align analytics inactive-report test

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: fix/analytics-buttons-pre-update-order
          fetch-depth: 0
      - name: Align hunter-profile expectation
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('tests/test_hunter_profile.py')
          text = path.read_text(encoding='utf-8')
          old = '    assert "page:report:inactive" not in callbacks\n'
          new = '    assert "page:report:inactive" in callbacks\n'
          if old not in text:
              raise SystemExit('inactive-report expectation not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/test_hunter_profile.py
          git commit -m "Align inactive report analytics expectation"
          git push origin HEAD:fix/analytics-buttons-pre-update-order
