name: Preserve analytics inactive-report button

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: fix/analytics-buttons-pre-update-order
          fetch-depth: 0
      - name: Preserve admin inactive-report callback
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('bbvg/bot/profile.py')
          text = path.read_text(encoding='utf-8')
          old = '''_ANALYTICS_DETAIL_CALLBACKS = frozenset({\n    "page:ranking",\n    "page:sources",\n    "page:report:inactive",\n})\n'''
          new = '''_ANALYTICS_DETAIL_CALLBACKS = frozenset({\n    "page:ranking",\n    "page:sources",\n})\n'''
          if old not in text:
              raise SystemExit('analytics detail callback block not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bbvg/bot/profile.py
          git commit -m "Preserve inactive report analytics button"
          git push origin HEAD:fix/analytics-buttons-pre-update-order
