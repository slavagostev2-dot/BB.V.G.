name: Chapter 3 wheel correction apply

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: chapter3-wheel-correction-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout chapter branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Apply code correction
        id: apply_code
        shell: bash
        run: |
          set -o pipefail
          {
            set -euxo pipefail
            if grep -q 'BetBoom создал колесо, но участие ещё не открыто' monitor.py; then
              echo 'Wheel correction is already applied.'
            else
              git apply --check .github/chapter3-wheel-start.patch
              git apply .github/chapter3-wheel-start.patch
            fi
            git diff --check
            git status --short
          } 2>&1 | tee chapter3-wheel-apply.log

      - name: Verify corrected behavior
        if: steps.apply_code.outcome == 'success'
        shell: bash
        run: |
          set -o pipefail
          {
            set -euxo pipefail
            python -m compileall -q -x '(^|/)(\.git|\.venv|state_api|docs)(/|$)' .
            python -m pytest -q tests/test_lifecycle.py tests/test_chapter3_contracts.py tests/test_recurring_event_hotfix.py tests/test_personal_wheel_voting.py
            python -m pytest -q
            python system_checks.py --self-test
            python system_checks_v2.py --self-test
            python preflight.py
            python monitor_validation_v41.py
            python tests/production_acceptance.py --section all
            if git diff --name-only | grep -E '\.json$'; then
              echo 'Runtime JSON changed during validation' >&2
              exit 1
            fi
          } 2>&1 | tee chapter3-wheel-verify.log

      - name: Commit corrected behavior
        if: steps.apply_code.outcome == 'success'
        shell: bash
        run: |
          set -o pipefail
          {
            set -euxo pipefail
            if git diff --quiet -- monitor.py monitor_entry.py bbvg_monitor_runtime.py tests/test_lifecycle.py; then
              echo 'No code correction remains to commit.'
              exit 0
            fi
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add monitor.py monitor_entry.py bbvg_monitor_runtime.py tests/test_lifecycle.py
            git commit -m "Глава 3: исключить ещё не запущенные колёса"
            for attempt in 1 2 3; do
              if git push origin "HEAD:${GITHUB_HEAD_REF}"; then
                exit 0
              fi
              git pull --rebase origin "${GITHUB_HEAD_REF}" || {
                git rebase --abort || true
                exit 1
              }
            done
            exit 1
          } 2>&1 | tee chapter3-wheel-commit.log

      - name: Upload correction logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: chapter3-wheel-correction-${{ github.run_id }}
          path: |
            chapter3-wheel-apply.log
            chapter3-wheel-verify.log
            chapter3-wheel-commit.log
          retention-days: 1
          if-no-files-found: warn
