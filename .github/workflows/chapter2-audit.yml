          python monitor_health.py --self-test
          bash -n monitor_shift_v41.sh
          python - <<'PY'
          from pathlib import Path
          import re
          workflows = list(Path('.github/workflows').glob('*.yml'))
          assert len(workflows) == 26, len(workflows)
          for path in workflows:
              for line in path.read_text(encoding='utf-8').splitlines():
                  if 'uses: actions/' in line:
                      ref = line.split('uses:', 1)[1].split('#', 1)[0].strip()
                      assert re.fullmatch(
                          r'actions/(?:checkout|setup-python|upload-artifact)@[0-9a-f]{40}',
                          ref,
                      ), (path, ref)
          print('Chapter 2 static action scan passed')
          PY

      - name: Commit candidate atomically
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Implement chapter 2 Actions hardening"
          git push origin HEAD:agent/chapter2-actions-hardening
