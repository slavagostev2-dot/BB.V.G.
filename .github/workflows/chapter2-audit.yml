name: Apply chapter 2 candidate

on:
  push:
    branches:
      - agent/chapter2-actions-hardening

permissions:
  contents: write

concurrency:
  group: bb-vg-chapter2-apply
  cancel-in-progress: false

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout candidate branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: agent/chapter2-actions-hardening
          fetch-depth: 0

