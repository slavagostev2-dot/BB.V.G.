name: Deploy Mini App to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "miniapp_deployment.json"
      - ".github/workflows/cloudflare-pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cloudflare-pages-miniapp
  cancel-in-progress: true

env:
  CLOUDFLARE_PROJECT_NAME: slavagostev2-betboom-monitor
  CLOUDFLARE_APP_URL: https://slavagostev2-betboom-monitor.pages.dev/

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Check Cloudflare credentials
        id: credentials
        shell: bash
        run: |
          if [[ -n "${CLOUDFLARE_API_TOKEN:-}" && -n "${CLOUDFLARE_ACCOUNT_ID:-}" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare secrets are not configured yet."
          fi

      - name: Set up Node.js
        if: steps.credentials.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate Mini App
        if: steps.credentials.outputs.configured == 'true'
        shell: bash
        run: |
          set -euo pipefail
          scripts=(
            docs/core.js
            docs/data.js
            docs/views-main.js
            docs/views-secondary.js
            docs/interactions.js
            docs/bootstrap.js
            docs/service-worker.js
          )
          for script in "${scripts[@]}"; do
            node --check "$script"
          done
          python - <<'PY'
          from pathlib import Path

          html = Path("docs/index.html").read_text(encoding="utf-8")
          required = [
              "core.js", "data.js", "views-main.js", "views-secondary.js",
              "interactions.js", "bootstrap.js", "styles.css",
          ]
          missing = [name for name in required if name not in html]
          if missing:
              raise SystemExit(f"Missing assets in index.html: {', '.join(missing)}")
          print("Mini App validation passed")
          PY

      - name: Create Cloudflare Pages project if needed
        if: steps.credentials.outputs.configured == 'true'
        shell: bash
        run: |
          npx --yes wrangler@4 pages project create "$CLOUDFLARE_PROJECT_NAME" \
            --production-branch main || true

      - name: Deploy Mini App
        if: steps.credentials.outputs.configured == 'true'
        shell: bash
        run: |
          npx --yes wrangler@4 pages deploy docs \
            --project-name "$CLOUDFLARE_PROJECT_NAME" \
            --branch main \
            --commit-hash "$GITHUB_SHA"

      - name: Record deployment status
        if: steps.credentials.outputs.configured == 'true'
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          value = {
              "status": "deployed",
              "provider": "cloudflare-pages",
              "url": os.environ["CLOUDFLARE_APP_URL"],
              "deployed_at": datetime.now(timezone.utc).isoformat(),
              "commit": os.environ.get("GITHUB_SHA", ""),
          }
          with open("miniapp_deployment.json", "w", encoding="utf-8") as stream:
              json.dump(value, stream, ensure_ascii=False, indent=2, sort_keys=True)
              stream.write("\n")
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add miniapp_deployment.json
          git commit -m "Record Cloudflare Mini App deployment [skip ci]" || true
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Explain missing credentials
        if: steps.credentials.outputs.configured != 'true'
        run: |
          echo "Add repository secrets CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID, then run this workflow manually."
