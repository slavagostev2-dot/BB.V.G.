name: Apply requested UI test contract

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'fix/notification-ai-diagnostics-2026-07-22'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact pull request head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: true
          fetch-depth: 1
          show-progress: false

      - name: Update source button expectations
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('tests/test_button_matrix.py')
          text = path.read_text(encoding='utf-8')
          old = '        ["page:sources", "page:ranking"],'
          new = '        ["page:ranking"],'
          count = text.count(old)
          if count != 2:
              raise SystemExit(f'Expected two source refresh expectations, found {count}')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add tests/test_button_matrix.py
          git commit -m "Align source button matrix with removed refresh action"
          git push origin "HEAD:${HEAD_BRANCH}"
