name: Apply second BetBoom account integration

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'feature/vyacheslav-second-betboom-account'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact pull request head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: true
          fetch-depth: 1
          show-progress: false

      - name: Integrate account sync and update documentation
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          python - <<'PY'
          from pathlib import Path

          bot = Path('bot_notification_state.py')
          text = bot.read_text(encoding='utf-8')
          old_import = 'import betboom_auto_participation\n'
          new_import = old_import + 'import betboom_account_participation\n'
          if 'import betboom_account_participation\n' not in text:
              if text.count(old_import) != 1:
                  raise SystemExit('Unexpected bot notification import contract')
              text = text.replace(old_import, new_import, 1)
          old_install = '    auto_participation_owner_sync.install(TelegramPanelV2)\n'
          new_install = (
              '    betboom_account_participation.install_owner_sync()\n'
              + old_install
          )
          if 'betboom_account_participation.install_owner_sync()' not in text:
              if text.count(old_install) != 1:
                  raise SystemExit('Unexpected owner sync install contract')
              text = text.replace(old_install, new_install, 1)
          bot.write_text(text, encoding='utf-8')

          agents = Path('AGENTS.md')
          text = agents.read_text(encoding='utf-8')
          marker = '- Автоучастие: `auto_participation_worker.py` выполняет первую event-попытку;'
          index = text.find(marker)
          if index < 0:
              raise SystemExit('Auto participation architecture marker not found')
          paragraph_end = text.find('\n- Ошибка запуска', index)
          if paragraph_end < 0:
              raise SystemExit('Auto participation paragraph end not found')
          addition = (
              '\n- Второй BetBoom-аккаунт Вячеслава использует отдельную сессию '
              '`BETBOOM_STORAGE_STATE_JSON_PART3/PART4` и предметный модуль '
              '`betboom_account_participation.py`. Его event-token содержит '
              '`#account:vyacheslav_secondary`, поэтому успех или ошибка основного '
              'аккаунта не подавляют второй. Итог доставляет тот же Control Center '
              'в профиль Telegram-пользователя «Вячеслав»; личный голос и рейтинг '
              'за одно событие остаются идемпотентными.\n'
          )
          if 'BETBOOM_STORAGE_STATE_JSON_PART3/PART4' not in text:
              text = text[:paragraph_end] + addition + text[paragraph_end:]
          agents.write_text(text, encoding='utf-8')

          changelog = Path('docs/PROJECT_CHANGELOG_RU.md')
          text = changelog.read_text(encoding='utf-8')
          title = '## 2026-07-22 — Второй BetBoom-аккаунт подключён к Вячеславу'
          if title not in text:
              marker = '---\n\n'
              if marker not in text:
                  raise SystemExit('Changelog marker not found')
              entry = (
                  title + '\n\n'
                  'Добавлена независимая сессия из `BETBOOM_STORAGE_STATE_JSON_PART3` '
                  'и `BETBOOM_STORAGE_STATE_JSON_PART4`. Для неё используется '
                  'отдельный account event-token `vyacheslav_secondary`, поэтому '
                  'оба BetBoom-аккаунта обрабатывают одно колесо независимо и не '
                  'перезаписывают результаты друг друга.\n\n'
                  'Успех или подтверждённая терминальная ошибка второго аккаунта '
                  'финализируются единственным Control Center и отправляются '
                  'Telegram-пользователю «Вячеслав» с пометкой «Аккаунт 2». '
                  'Повторное начисление рейтинга одному Telegram-пользователю за '
                  'одно событие исключено штатной идемпотентностью личного голоса.\n\n'
                  '**Pre-update backup:** '
                  '`backup/2026-07-22-before-vyacheslav-second-account`.\n\n'
              )
              text = text.replace(marker, marker + entry, 1)
          changelog.write_text(text, encoding='utf-8')
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add bot_notification_state.py AGENTS.md docs/PROJECT_CHANGELOG_RU.md
          git commit -m "Integrate Vyacheslav second BetBoom account"
          git push origin "HEAD:${HEAD_BRANCH}"
