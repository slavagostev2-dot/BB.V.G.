name: Apply auto participation retry state synchronization

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'fix/auto-participation-retry-state-sync'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact pull request head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: true
          fetch-depth: 1
          show-progress: false

      - name: Apply state refresh and retry policy
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              if new in text:
                  return
              if text.count(old) != 1:
                  raise SystemExit(f'Unexpected replacement contract for {path}: {old[:80]!r}')
              file.write_text(text.replace(old, new, 1), encoding='utf-8')

          recovery = Path('auto_participation_recovery.py')
          text = recovery.read_text(encoding='utf-8')
          root_marker = 'ROOT = Path(__file__).resolve().parent\n'
          constants = '''ROOT = Path(__file__).resolve().parent
_TRANSIENT_FAILURE_STATUSES = {
    "browser_error",
    "unconfirmed",
    "timeout",
    "navigation_timeout",
    "page_timeout",
}
_TRANSIENT_FAILURE_MARKERS = (
    "timeouterror",
    "timeout",
    "page.goto",
    "net::",
    "connection",
    "target closed",
)
_TRANSIENT_RETRY_DELAY = timedelta(minutes=3)


def _transient_failure(status: str, detail: str) -> bool:
    normalized_status = str(status or "").casefold()
    normalized_detail = str(detail or "").casefold()
    return normalized_status in _TRANSIENT_FAILURE_STATUSES or any(
        marker in normalized_detail for marker in _TRANSIENT_FAILURE_MARKERS
    )
'''
          if '_TRANSIENT_FAILURE_STATUSES' not in text:
              if text.count(root_marker) != 1:
                  raise SystemExit('Recovery root marker not found')
              text = text.replace(root_marker, constants, 1)

          old_failure = '''    record: dict[str, Any] = {
        "wheel_key": key,
        "status": status,
        "detail": detail[:300],
        "attempted_at": scanned_at.isoformat(),
        "retry_allowed": False,
        "recovery_scan": True,
    }
    if isinstance(previous, dict):
        for field in (
            "manual_notification_sent",
            "manual_notification_detail",
            "manual_notification_at",
            "bot_failure_pending_at",
            "bot_failure_sync_status",
            "bot_failure_sync_version",
            "bot_failure_status",
            "bot_failure_detail",
        ):
            if field in previous:
                record[field] = previous[field]

    # Legacy recovery may already have sent a failure before this architecture was
    # introduced. Never queue a second failure for that exact event.
    if not bool(record.get("manual_notification_sent")):
        record.setdefault("bot_failure_pending_at", scanned_at.isoformat())
        record["bot_failure_sync_status"] = "waiting_for_control_center"
        record["bot_failure_sync_version"] = 1
        record["bot_failure_status"] = status
        record["bot_failure_detail"] = detail[:300]
    return record
'''
          new_failure = '''    transient = _transient_failure(status, detail)
    record: dict[str, Any] = {
        "wheel_key": key,
        "status": status,
        "detail": detail[:300],
        "attempted_at": scanned_at.isoformat(),
        "retry_allowed": transient,
        "recovery_scan": True,
    }
    if isinstance(previous, dict):
        for field in (
            "manual_notification_sent",
            "manual_notification_detail",
            "manual_notification_at",
            "bot_failure_pending_at",
            "bot_failure_sync_status",
            "bot_failure_sync_version",
            "bot_failure_status",
            "bot_failure_detail",
        ):
            if field in previous:
                record[field] = previous[field]

    if transient:
        for field in (
            "bot_failure_pending_at",
            "bot_failure_sync_status",
            "bot_failure_sync_version",
            "bot_failure_status",
            "bot_failure_detail",
        ):
            record.pop(field, None)
        record["retry_after_at"] = (
            scanned_at + _TRANSIENT_RETRY_DELAY
        ).isoformat()
        record["user_alert_policy"] = "deferred_transient_failure"
        return record

    # Legacy recovery may already have sent a failure before this architecture was
    # introduced. Never queue a second failure for that exact event.
    if not bool(record.get("manual_notification_sent")):
        record.setdefault("bot_failure_pending_at", scanned_at.isoformat())
        record["bot_failure_sync_status"] = "waiting_for_control_center"
        record["bot_failure_sync_version"] = 1
        record["bot_failure_status"] = status
        record["bot_failure_detail"] = detail[:300]
    return record
'''
          if 'transient = _transient_failure(status, detail)' not in text:
              if text.count(old_failure) != 1:
                  raise SystemExit('Recovery failure record contract not found')
              text = text.replace(old_failure, new_failure, 1)

          old_entry = '''            entry.update(
                {
                    "participating": False,
                    "lifecycle_state": "active",
                    "auto_participation_status": status,
                    "auto_participation_checked_at": scanned_at.isoformat(),
                    "auto_participation_retry_allowed": False,
                    "auto_participation_error": detail,
                }
            )
            continue
'''
          new_entry = '''            transient = _transient_failure(status, detail)
            entry.update(
                {
                    "participating": False,
                    "lifecycle_state": "active",
                    "auto_participation_status": status,
                    "auto_participation_checked_at": scanned_at.isoformat(),
                    "auto_participation_retry_allowed": transient,
                    "auto_participation_error": detail,
                }
            )
            if transient:
                entry["auto_participation_retry_after_at"] = (
                    scanned_at + _TRANSIENT_RETRY_DELAY
                ).isoformat()
                entry["auto_participation_user_alert_policy"] = (
                    "deferred_transient_failure"
                )
            else:
                entry.pop("auto_participation_retry_after_at", None)
                entry.pop("auto_participation_user_alert_policy", None)
            continue
'''
          if 'entry["auto_participation_retry_after_at"]' not in text:
              if text.count(old_entry) != 1:
                  raise SystemExit('Recovery active entry contract not found')
              text = text.replace(old_entry, new_entry, 1)
          recovery.write_text(text, encoding='utf-8')

          sync = Path('auto_participation_bot_sync.py')
          text = sync.read_text(encoding='utf-8')
          fields_marker = '    "auto_participation_rearm_reason",\n'
          fields_new = fields_marker + '    "auto_participation_retry_after_at",\n    "auto_participation_user_alert_policy",\n'
          if '"auto_participation_retry_after_at"' not in text:
              if text.count(fields_marker) != 1:
                  raise SystemExit('Auto participation merge fields marker not found')
              text = text.replace(fields_marker, fields_new, 1)

          print_marker = '    print("auto participation bot outcome sync self-test passed")\n'
          test_block = '''    monitor_local = {
        "active_wheels": {
            "existing": {"wheel_key": "existing", "last_checked_at": "local"}
        },
        "auto_participation_events": {},
    }
    workflow_remote = {
        "active_wheels": {
            "ctom13": {
                "wheel_key": "ctom13",
                "auto_participation_status": "unconfirmed",
                "auto_participation_retry_allowed": True,
                "auto_participation_retry_after_at": "2026-07-22T13:18:00+00:00",
            }
        },
        "auto_participation_events": {
            "ctom13#action:971:start": {
                "wheel_key": "ctom13",
                "status": "unconfirmed",
                "attempted_at": "2026-07-22T13:15:00+00:00",
                "retry_allowed": True,
            }
        },
    }
    refreshed = merge_auto_participation_state(monitor_local, workflow_remote)
    assert refreshed["active_wheels"]["existing"]["last_checked_at"] == "local"
    assert refreshed["active_wheels"]["ctom13"]["auto_participation_retry_allowed"] is True
    assert "ctom13#action:971:start" in refreshed["auto_participation_events"]
    print("auto participation bot outcome sync self-test passed")
'''
          if 'workflow_remote = {' not in text:
              if text.count(print_marker) != 1:
                  raise SystemExit('Auto participation sync self-test marker not found')
              text = text.replace(print_marker, test_block, 1)
          sync.write_text(text, encoding='utf-8')

          workflow = Path('.github/workflows/monitor.yml')
          text = workflow.read_text(encoding='utf-8')
          path_marker = '      - "personal_reminder_filter.py"\n'
          path_new = (
              path_marker
              + '      - "auto_participation_bot_sync.py"\n'
              + '      - "auto_participation_recovery.py"\n'
              + '      - "betboom_account_participation.py"\n'
          )
          if '      - "auto_participation_bot_sync.py"\n' not in text:
              if text.count(path_marker) != 1:
                  raise SystemExit('Monitor paths marker not found')
              text = text.replace(path_marker, path_new, 1)

          compile_old = 'personal_reminder_filter.py notification_preferences_v2.py'
          compile_new = 'personal_reminder_filter.py auto_participation_bot_sync.py auto_participation_recovery.py betboom_account_participation.py notification_preferences_v2.py'
          if compile_new not in text:
              if text.count(compile_old) != 1:
                  raise SystemExit('Monitor compile marker not found')
              text = text.replace(compile_old, compile_new, 1)

          test_old = '          python personal_reminder_filter.py\n'
          test_new = test_old + '          python auto_participation_bot_sync.py --self-test\n          python auto_participation_recovery.py --self-test\n          python betboom_account_participation.py --self-test\n'
          if 'python auto_participation_bot_sync.py --self-test' not in text:
              if text.count(test_old) != 1:
                  raise SystemExit('Monitor self-test marker not found')
              text = text.replace(test_old, test_new, 1)

          function_marker = '''          push_runtime() {
'''
          function_block = '''          refresh_authoritative_state() {
            local monitor_local=/tmp/bbvg-monitor-local-state.json
            local remote_main=/tmp/bbvg-monitor-remote-state.json
            cp state.json "$monitor_local"

            if ! timeout --signal=TERM --kill-after=5s 20s git fetch origin main >/dev/null 2>&1; then
              echo "WARNING authoritative state refresh fetch failed; keeping local monitor state."
              return 0
            fi
            if ! git show origin/main:state.json > "$remote_main"; then
              echo "WARNING authoritative state.json is unavailable; keeping local monitor state."
              return 0
            fi

            if ! python auto_participation_bot_sync.py \\
              --merge-local "$remote_main" \\
              --merge-remote "$monitor_local" \\
              --merge-output state.json >/tmp/bbvg-monitor-state-refresh.json; then
              cp "$monitor_local" state.json
              echo "WARNING authoritative auto-participation state merge failed; restored local state."
              return 0
            fi
          }

          push_runtime() {
'''
          if 'refresh_authoritative_state() {' not in text:
              if text.count(function_marker) != 1:
                  raise SystemExit('Monitor push function marker not found')
              text = text.replace(function_marker, function_block, 1)

          loop_old = '''            started_at=$(date +%s)
            admin_action_before=$(python - <<'PY'
'''
          loop_new = '''            started_at=$(date +%s)
            refresh_authoritative_state
            admin_action_before=$(python - <<'PY'
'''
          if '            refresh_authoritative_state\n' not in text:
              if text.count(loop_old) != 1:
                  raise SystemExit('Monitor loop refresh marker not found')
              text = text.replace(loop_old, loop_new, 1)
          workflow.write_text(text, encoding='utf-8')

          agents = Path('AGENTS.md')
          text = agents.read_text(encoding='utf-8')
          marker = '- Автоучастие: `auto_participation_worker.py` выполняет первую event-попытку;'
          index = text.find(marker)
          if index < 0:
              raise SystemExit('AGENTS auto participation marker not found')
          paragraph_end = text.find('\n- Второй BetBoom-аккаунт', index)
          if paragraph_end < 0:
              raise SystemExit('AGENTS second account paragraph marker not found')
          addition = (
              '\n- Непрерывный монитор перед каждой итерацией получает актуальный '
              '`state.json` из `main` и через `auto_participation_bot_sync.py` '
              'подмешивает результаты изолированного workflow, не теряя локальные '
              'lifecycle-изменения. Временные результаты `unconfirmed`, browser/network '
              'timeout и аналогичные transport-сбои остаются retryable и повторяются '
              'до подтверждения либо терминального ответа BetBoom.\n'
          )
          if 'Непрерывный монитор перед каждой итерацией получает актуальный' not in text:
              text = text[:paragraph_end] + addition + text[paragraph_end:]
          agents.write_text(text, encoding='utf-8')

          changelog = Path('docs/PROJECT_CHANGELOG_RU.md')
          text = changelog.read_text(encoding='utf-8')
          title = '## 2026-07-22 — Повтор автоучастия после `unconfirmed` восстановлен'
          if title not in text:
              marker = '---\n\n'
              if marker not in text:
                  raise SystemExit('Changelog marker not found')
              entry = (
                  title + '\n\n'
                  'Инцидент `ctom13` показал гонку состояния: отдельный workflow '
                  'записал `unconfirmed` после запуска долгоживущего монитора, а '
                  'монитор продолжал работать со старой локальной копией `state.json` '
                  'и не мог поставить повторную попытку.\n\n'
                  'Теперь перед каждой итерацией монитор получает `state.json` из '
                  '`main` и безопасно объединяет только новые auto-participation '
                  'исходы с локальным lifecycle-состоянием. `unconfirmed`, browser '
                  'timeout и сетевые ошибки сохраняются как retryable с трёхминутной '
                  'задержкой; пользовательское отрицательное уведомление для них '
                  'по-прежнему запрещено.\n\n'
                  '**Pre-update backup:** '
                  '`backup/2026-07-22-before-auto-participation-retry-sync`.\n\n'
              )
              text = text.replace(marker, marker + entry, 1)
          changelog.write_text(text, encoding='utf-8')
          PY

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/workflows/monitor.yml auto_participation_recovery.py auto_participation_bot_sync.py AGENTS.md docs/PROJECT_CHANGELOG_RU.md
          git commit -m "Retry transient auto participation with authoritative state refresh"
          git push origin "HEAD:${HEAD_BRANCH}"
