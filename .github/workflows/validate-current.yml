name: Validate current BB V.G. commit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bb-vg-current-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      failed: ${{ steps.pytest.outputs.failed }}
      status: ${{ steps.pytest.outputs.status }}
    env:
      BOT_TOKEN: test-bot-token
      BOT_STATE_KEY: test-state-key
      BOT_CHAT_ID: "1"
      ADMIN_USER_ID: "1"
      BBVG_TEST_MODE: "1"
      TELEGRAM_WEB_DOMAIN: telegram.me
      FINAL_REMINDER_BEFORE_MINUTES: "5"
      ACTIVE_REMOVE_GRACE_MINUTES: "0"
      EXPECTED_EVENT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - name: Checkout the workflow commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Verify the exact event commit
        run: python ci_verify_current_commit.py --expected "$EXPECTED_EVENT_SHA"
      - name: Install dependencies
        run: python -m pip install -q -r requirements-dev.txt
      - name: Capture pytest failures
        id: pytest
        shell: bash
        run: |
          set +e
          python -m pytest -q > pytest-output.txt 2>&1
          status=$?
          failed="$(grep '^FAILED ' pytest-output.txt | sed 's/^FAILED //' | awk '{print $1}' | paste -sd ',' - | cut -c1-220)"
          if [[ -z "$failed" ]]; then
            failed="exit-${status}-$(tail -n 1 pytest-output.txt | tr -cd '[:alnum:]_.:% /- ' | cut -c1-160)"
          fi
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "failed=$failed" >> "$GITHUB_OUTPUT"
          exit 0

  report:
    name: pytest failures — ${{ needs.diagnose.outputs.failed }}
    needs: diagnose
    runs-on: ubuntu-latest
    steps:
      - name: Fail when pytest failed
        env:
          PYTEST_STATUS: ${{ needs.diagnose.outputs.status }}
        run: test "$PYTEST_STATUS" = "0"
