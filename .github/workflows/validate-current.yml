name: Apply exact referral shorthand fix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'fix/referral-shorthand-ctom13'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact pull request head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: true
          fetch-depth: 1
          show-progress: false

      - name: Recognize the exact CTOM referral phrase
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          python - <<'PY'
          from pathlib import Path

          detector = Path('wheel_publications_v2.py')
          text = detector.read_text(encoding='utf-8')
          marker = '''    re.compile(r"\\b(?:для|моим?|нашим?)\\s+реферал\\w*\\b", re.IGNORECASE),
'''
          addition = marker + '''    re.compile(r"\\b(?:колес\\w*\\s+)?для\\s+рефов\\b", re.IGNORECASE),
'''
          if 'для\\s+рефов' not in text:
              if text.count(marker) != 1:
                  raise SystemExit('Referral detector marker not found')
              text = text.replace(marker, addition, 1)
          detector.write_text(text, encoding='utf-8')

          tests = Path('tests/test_chapter5_lifecycle.py')
          text = tests.read_text(encoding='utf-8')
          marker = '''        self.assertTrue(wheel_publications_v2.is_referral_restricted(restricted))
        self.assertFalse(wheel_publications_v2.is_referral_restricted(regular))
'''
          addition = '''        self.assertTrue(wheel_publications_v2.is_referral_restricted(restricted))
        ctom13_text = (
            "Колесо для рефов на BetBoom "
            "https://betboom.ru/freestream/CTOM13"
        )
        self.assertTrue(wheel_publications_v2.is_referral_restricted(ctom13_text))
        self.assertIn(
            "Колесо только для рефералов",
            wheel_publications_v2.referral_restriction_notice(ctom13_text),
        )
        self.assertFalse(wheel_publications_v2.is_referral_restricted(regular))
'''
          if 'ctom13_text = (' not in text:
              if text.count(marker) != 1:
                  raise SystemExit('Referral lifecycle test marker not found')
              text = text.replace(marker, addition, 1)
          tests.write_text(text, encoding='utf-8')

          agents = Path('AGENTS.md')
          text = agents.read_text(encoding='utf-8')
          marker = '- Автоучастие: `auto_participation_worker.py` выполняет первую event-попытку;'
          index = text.find(marker)
          if index < 0:
              raise SystemExit('AGENTS auto participation marker not found')
          paragraph_end = text.find('\n- Второй BetBoom-аккаунт', index)
          if paragraph_end < 0:
              raise SystemExit('AGENTS second account marker not found')
          addition = (
              '\n- Реферальное ограничение определяется детерминированно по тексту '
              'публикации в `wheel_publications_v2.py`. Формулировки «только для '
              'рефералов», «для рефералов» и разговорное «колесо для рефов» '
              'обязаны добавлять в первичное уведомление предупреждение '
              '«Колесо только для рефералов». Эта классификация не меняет '
              'браузерный механизм обычного автоучастия.\n'
          )
          if 'разговорное «колесо для рефов»' not in text:
              text = text[:paragraph_end] + addition + text[paragraph_end:]
          agents.write_text(text, encoding='utf-8')

          changelog = Path('docs/PROJECT_CHANGELOG_RU.md')
          text = changelog.read_text(encoding='utf-8')
          title = '## 2026-07-22 — Исправлено распознавание «колесо для рефов»'
          if title not in text:
              marker = '---\n\n'
              if marker not in text:
                  raise SystemExit('Changelog marker not found')
              entry = (
                  title + '\n\n'
                  'Инцидент `ctom13` показал, что сокращённая формулировка '
                  '«Колесо для рефов» не попадала под существующие правила '
                  'реферального ограничения. В детерминированный распознаватель '
                  'добавлен точный шаблон этой фразы, поэтому новое колесо теперь '
                  'сразу получает предупреждение «Колесо только для рефералов».\n\n'
                  'Браузерная логика автоучастия, обе BetBoom-сессии и политика '
                  'повторных попыток не изменялись. Добавлен регрессионный тест '
                  'на дословный текст публикации `ctom13`.\n\n'
                  '**Pre-update backup:** '
                  '`backup/2026-07-22-before-referral-shorthand-fix`.\n\n'
              )
              text = text.replace(marker, marker + entry, 1)
          changelog.write_text(text, encoding='utf-8')
          PY

          python -m py_compile wheel_publications_v2.py
          python -m pytest tests/test_chapter5_lifecycle.py -q

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add wheel_publications_v2.py tests/test_chapter5_lifecycle.py AGENTS.md docs/PROJECT_CHANGELOG_RU.md
          git commit -m "Recognize referral-only wheel shorthand"
          git push origin "HEAD:${HEAD_BRANCH}"
