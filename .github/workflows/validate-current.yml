name: Validate current BB V.G. commit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bb-vg-current-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BOT_TOKEN: test-bot-token
      BOT_STATE_KEY: test-state-key
      BOT_CHAT_ID: "1"
      ADMIN_USER_ID: "1"
      BBVG_TEST_MODE: "1"
      TELEGRAM_WEB_DOMAIN: telegram.me
      FINAL_REMINDER_BEFORE_MINUTES: "5"
      ACTIVE_REMOVE_GRACE_MINUTES: "0"
      EXPECTED_EVENT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

    steps:
      - name: Checkout the workflow commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Verify the exact event commit
        run: python ci_verify_current_commit.py --expected "$EXPECTED_EVENT_SHA"

      - name: Install production and test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Compile every active Python module
        run: |
          python -m compileall -q \
            -x '(^|/)(\.git|\.venv|state_api|docs)(/|$)' \
            .

      - name: Run repository preflight
        run: python preflight.py

      - name: Run chapters 1 to 3
        run: |
          python chapter1_stability.py
          python chapter2_unified_logic.py
          python chapter3_acceptance.py
      - name: Run chapter 4 self-tests
        run: |
          python telegram_ui.py
          python admin_panel_runtime_v41.py --self-test
      - name: Validate wrapper entrypoint
        run: |
          python - <<'PY'
          from pathlib import Path
          from admin_panel_runtime_v41 import TelegramPanelRuntimeV41
          workflow = Path('.github/workflows/admin-bot.yml').read_text(encoding='utf-8')
          assert TelegramPanelRuntimeV41.RUNTIME_VERSION == 41
          assert 'run: python notification_button_recovery.py' in workflow
          assert 'admin_panel_runtime_v41.py' in workflow
          assert Path('scripts/validate_control_center.sh').is_file()
          PY
      - name: Validate chapter 4 menu roles
        run: |
          python - <<'PY'
          from admin_panel_runtime_v41 import TelegramPanelRuntimeV41
          user = {str(b.get('callback_data') or '') for r in TelegramPanelRuntimeV41.compact_menu_rows(False) for b in r}
          admin = {str(b.get('callback_data') or '') for r in TelegramPanelRuntimeV41.compact_menu_rows(True) for b in r}
          assert 'page:status' in user
          assert 'page:control' not in user
          assert 'page:control' in admin
          assert 'page:status' not in admin
          PY
      - name: Validate chapter 4 markup
        run: |
          python - <<'PY'
          import telegram_ui
          from admin_panel_runtime_v41 import TelegramPanelRuntimeV41
          assert not telegram_ui.markup_issues({'inline_keyboard': TelegramPanelRuntimeV41.compact_menu_rows(False)})
          assert not telegram_ui.markup_issues({'inline_keyboard': TelegramPanelRuntimeV41.compact_menu_rows(True)})
          PY
      - name: Validate chapter 4 archive files
        run: |
          python - <<'PY'
          from pathlib import Path
          assert 'Mini App — архивировано' in Path('MINI_APP_ARCHIVED.md').read_text(encoding='utf-8')
          assert Path('tests/test_ui_chapter4.py').exists()
          PY
      - name: Run chapter 5 acceptance
        run: python chapter5_acceptance.py

      - name: Validate source discovery synchronization
        run: |
          python admin_runtime.py --self-test
          python system_checks_v3.py --self-test

      - name: Run pytest and enforce critical-core coverage
        run: |
          python -m pytest \
            --cov=notification_router \
            --cov=notification_integrity_v2 \
            --cov=wheel_publications_v2 \
            --cov=rating_policy \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80
