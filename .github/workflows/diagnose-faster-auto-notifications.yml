name: Diagnose faster auto participation notifications

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/diagnose-faster-auto-notifications.yml"

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      WORK_BRANCH: feature/faster-auto-participation-notifications
      APPLY_SCRIPT: scripts/apply_faster_auto_notifications.py
      BRANCH_WORKFLOW: .github/workflows/apply-faster-auto-notifications.yml
      MAIN_WORKFLOW: .github/workflows/diagnose-faster-auto-notifications.yml
    steps:
      - name: Checkout working branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: feature/faster-auto-participation-notifications
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Apply, test and record diagnostics
        env:
          BBVG_TEST_MODE: "1"
          BOT_TOKEN: "test-token"
          BOT_STATE_KEY: "test-state-key"
          BOT_CHAT_ID: "1"
          ADMIN_USER_ID: "1"
        shell: bash
        run: |
          set -uo pipefail
          exec > >(tee /tmp/faster-auto-notifications.log) 2>&1
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          original_sha=$(git rev-parse HEAD)
          stage=rebase
          failed=0
          git fetch origin main || failed=1
          if [[ $failed == 0 ]]; then git rebase origin/main || failed=1; fi
          if [[ $failed == 0 ]]; then stage=apply; python "$APPLY_SCRIPT" || failed=1; fi
          if [[ $failed == 0 ]]; then stage=dependencies; python -m pip install -r requirements.txt || failed=1; fi
          if [[ $failed == 0 ]]; then
            stage=validation
            python -m py_compile auto_participation_owner_sync.py auto_participation_recovery.py auto_participation_notifications.py xflarxx_account_participation.py notification_button_recovery.py || failed=1
            python auto_participation_owner_sync.py || failed=1
            python auto_participation_recovery.py --self-test || failed=1
            python auto_participation_notifications.py || failed=1
            python xflarxx_account_participation.py --self-test || failed=1
            python notification_button_recovery.py --self-test || failed=1
          fi
          if [[ $failed == 0 ]]; then stage=pytest; pytest -q || failed=1; fi
          if [[ $failed != 0 ]]; then
            echo "FAILED_STAGE=$stage"
            git rebase --abort || true
            git reset --hard "$original_sha"
            cp /tmp/faster-auto-notifications.log faster_auto_notifications_failure.log
            git add faster_auto_notifications_failure.log
            git commit -m "Record faster notification preparation failure at $stage [skip ci]" || true
            git push --force-with-lease origin "HEAD:${WORK_BRANCH}"
            exit 1
          fi
          rm -f "$APPLY_SCRIPT" "$BRANCH_WORKFLOW" faster_auto_notifications_failure.log
          git add -A
          git commit -m "Ускорить уведомления автоучастия"
          git push --force-with-lease origin "HEAD:${WORK_BRANCH}"

      - name: Remove temporary diagnostic workflow
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          git rebase --abort || true
          git fetch origin main
          git checkout -B cleanup-main origin/main
          if [[ -f "$MAIN_WORKFLOW" ]]; then
            git rm "$MAIN_WORKFLOW"
            git commit -m "Remove faster notification diagnostic workflow [skip ci]"
            for attempt in 1 2 3 4 5; do
              if git push origin HEAD:main; then exit 0; fi
              git pull --rebase origin main
              sleep $((attempt * 2))
            done
            exit 1
          fi
