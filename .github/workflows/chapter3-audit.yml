name: Chapter 3 contract audit

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact proposed commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Collect contract source snapshot
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p chapter3-source
          find . -type f \
            \( -name '*.py' -o -name '*.sh' -o -name '*.yml' -o -name '*.yaml' -o -name '*.txt' -o -name '*.md' \) \
            -not -path './.git/*' \
            -not -path './.venv/*' \
            -not -path './node_modules/*' \
            -print0 | while IFS= read -r -d '' path; do
              mkdir -p "chapter3-source/$(dirname "$path")"
              cp "$path" "chapter3-source/$path"
            done
          for path in system_check_state.json incident_state.json source_registry.json source_transport_state.json monitor_status.json admin_panel_status.json state.json source_stats.json; do
            if [ -f "$path" ]; then
              cp "$path" "chapter3-source/$path"
            fi
          done
          git rev-parse HEAD > chapter3-source/HEAD_SHA

      - name: Upload contract snapshot
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: chapter3-contract-source-${{ github.run_id }}
          path: chapter3-source
          retention-days: 1
          if-no-files-found: error
