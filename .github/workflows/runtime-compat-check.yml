name: Runtime compatibility checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  compatibility:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      BOT_TOKEN: test-bot-token
      BOT_STATE_KEY: test-state-key
      BOT_CHAT_ID: "1"
      ADMIN_USER_ID: "1"
      BBVG_TEST_MODE: "1"
      TELEGRAM_WEB_DOMAIN: telegram.me
      UNKNOWN_DEDUP_HOURS: "2"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r requirements.txt

      - name: v25 storage contract
        run: python -m bbvg.bot.storage

      - name: v25 menu contract
        run: |
          python - <<'PY'
          from admin_panel_runtime_v25 import TelegramPanelRuntimeV25
          callbacks = {
              button.get('callback_data')
              for row in TelegramPanelRuntimeV25.compact_menu_rows(True)
              for button in row
          }
          assert 'page:app' not in callbacks
          assert 'page:ranking' not in callbacks
          assert 'page:discovery' in callbacks
          assert 'page:intelligence' in callbacks
          PY

      - name: v25 callback source contract
        run: |
          python - <<'PY'
          import inspect
          from admin_panel_runtime_v25 import TelegramPanelRuntimeV25
          source = inspect.getsource(TelegramPanelRuntimeV25.handle_callback)
          assert 'register_user' in source
          assert 'private_chat' in source
          PY

      - name: v25 panel construction
        run: |
          python - <<'PY'
          from pathlib import Path
          from tempfile import TemporaryDirectory
          import bot_private_state
          from admin_panel_runtime_v25 import TelegramPanelRuntimeV25
          original = bot_private_state.STATE_PATH
          try:
              with TemporaryDirectory() as temporary:
                  bot_private_state.STATE_PATH = Path(temporary) / 'state.enc.json'
                  TelegramPanelRuntimeV25()
          finally:
              bot_private_state.STATE_PATH = original
          PY

      - name: v25 callback registration
        run: |
          python - <<'PY'
          from pathlib import Path
          from tempfile import TemporaryDirectory
          import bot_private_state
          from admin_panel_runtime_v25 import TelegramPanelRuntimeV25
          from bbvg.bot.source_requests import default_source_requests

          original = bot_private_state.STATE_PATH
          try:
              with TemporaryDirectory() as temporary:
                  bot_private_state.STATE_PATH = Path(temporary) / 'state.enc.json'
                  panel = TelegramPanelRuntimeV25()
                  panel._bot_bundle = bot_private_state.default_bundle(
                      panel._bootstrap_access(), default_source_requests()
                  )
                  panel._bundle_baseline = None
                  panel._save_bot_bundle = lambda message: True
                  panel.send = lambda *args, **kwargs: {'ok': True}
                  panel.answer = lambda *args, **kwargs: None
                  panel.handle_callback({
                      'id': 'callback-test',
                      'from': {'id': 2, 'username': 'button_user', 'first_name': 'Button'},
                      'message': {'message_id': 1, 'chat': {'id': 2, 'type': 'private'}},
                      'data': 'nav:home',
                  })
                  assert '2' in panel.access.get('users', {})
                  assert panel.role_for('2') == 'user'
          finally:
              bot_private_state.STATE_PATH = original
          PY

      - name: runtime v30 isolated
        run: |
          python - <<'PY'
          from pathlib import Path
          from tempfile import TemporaryDirectory
          import bot_private_state
          import admin_panel_runtime_v30
          original = bot_private_state.STATE_PATH
          try:
              with TemporaryDirectory() as temporary:
                  bot_private_state.STATE_PATH = Path(temporary) / 'state.enc.json'
                  admin_panel_runtime_v30.self_test()
          finally:
              bot_private_state.STATE_PATH = original
          PY

      - name: remaining compatibility layers
        run: |
          python admin_panel_runtime_v26.py --self-test
          python admin_panel_runtime_v28.py --self-test
          python admin_panel_runtime_v29.py --self-test
          python admin_panel_runtime_v31.py --self-test
          python admin_panel_runtime_v32.py --self-test
          python admin_panel_runtime_v36.py --self-test
          python admin_panel_runtime_v37.py --self-test
          python admin_panel_runtime_v38.py --self-test
          python admin_panel_runtime_v41.py --self-test
