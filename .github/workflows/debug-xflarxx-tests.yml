name: Debug xFLARXx tests

on:
  push:
    branches: [feature/xflarxx-clean-integration]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: feature/xflarxx-clean-integration
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run tests and save exact failure
        shell: bash
        run: |
          set +e
          python -m pytest -q 2>&1 | tee /tmp/xflarxx-pytest.log
          code=${PIPESTATUS[0]}
          if [[ "$code" != 0 ]]; then
            tail -n 240 /tmp/xflarxx-pytest.log > xflarxx_pytest_failure.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -f xflarxx_pytest_failure.txt
            git commit -m "Record xFLARXx pytest failure [skip ci]" || true
            git push origin HEAD:feature/xflarxx-clean-integration
          fi
          exit "$code"
