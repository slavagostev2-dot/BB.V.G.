name: v34 diagnostic

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    env:
      BOT_TOKEN: test-bot-token
      BOT_STATE_KEY: test-state-key
      BOT_CHAT_ID: "1"
      ADMIN_USER_ID: "1"
      BBVG_TEST_MODE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt
      - name: Compile v34
        run: python -m py_compile admin_panel_runtime_v34.py
      - name: Prepare stale merge result
        run: |
          python - <<'PY'
          import copy, json
          from pathlib import Path
          from admin_panel_runtime_v34 import TelegramPanelRuntimeV34
          panel = TelegramPanelRuntimeV34()
          base = panel.normalize_access({"owner_id":"1","admins":[],"users":{"1":{"id":"1","chat_id":"10"},"2":{"id":"2","chat_id":"20","notification_preferences":{"wheels":True}}}})
          local = copy.deepcopy(base)
          local["users"]["2"]["notification_preferences"]["wheel_final_reminders"] = False
          remote = copy.deepcopy(base)
          remote["admins"] = ["2"]
          remote["users"]["2"]["last_name"] = "Remote"
          merged = panel._merge_access(base, local, remote)
          Path("/tmp/merged.json").write_text(json.dumps(merged), encoding="utf-8")
          PY
      - name: Check remote role survived
        run: python -c 'import json; v=json.load(open("/tmp/merged.json")); assert v["admins"] == ["2"], v["admins"]'
      - name: Check remote profile survived
        run: python -c 'import json; v=json.load(open("/tmp/merged.json")); assert v["users"]["2"].get("last_name") == "Remote", v["users"]["2"]'
      - name: Check local preference survived
        run: python -c 'import json; v=json.load(open("/tmp/merged.json")); assert v["users"]["2"]["notification_preferences"].get("wheel_final_reminders") is False, v["users"]["2"]'
      - name: Check role change preserves new user
        run: |
          python - <<'PY'
          import copy
          from admin_panel_runtime_v34 import TelegramPanelRuntimeV34
          panel = TelegramPanelRuntimeV34()
          base = panel.normalize_access({"owner_id":"1","admins":[],"users":{"1":{"id":"1","chat_id":"10"},"2":{"id":"2","chat_id":"20"}}})
          local = copy.deepcopy(base)
          local["admins"] = ["2"]
          remote = copy.deepcopy(base)
          remote["users"]["3"] = {"id":"3","chat_id":"30"}
          merged = panel._merge_access(base, local, remote)
          assert merged["admins"] == ["2"]
          assert "3" in merged["users"]
          PY
      - name: Check owner notification mutation
        run: |
          python - <<'PY'
          import copy
          import bot_private_state
          from admin_panel_runtime_v17 import default_source_requests
          from admin_panel_runtime_v34 import TelegramPanelRuntimeV34
          panel = TelegramPanelRuntimeV34()
          access = panel.normalize_access({"owner_id":"1","admins":[],"users":{"1":{"id":"1","chat_id":"10"},"2":{"id":"2","chat_id":"20","notification_preferences":{"wheels":True}}}})
          panel._bot_bundle = bot_private_state.default_bundle(access, default_source_requests())
          panel._bundle_baseline = copy.deepcopy(panel._bot_bundle)
          panel.access = access
          panel.access_loaded = True
          panel.current_user_id = "1"
          panel.current_chat_id = "10"
          panel.current_role = "owner"
          saved = []
          panel._save_bot_bundle = lambda message: saved.append(message) or True
          panel.dispatch = lambda workflow, inputs=None: None
          panel.set_user_notification("2", "wheel_final_reminders", False)
          assert panel.access["users"]["2"]["notification_preferences"]["wheel_final_reminders"] is False
          assert saved
          PY
      - name: Run complete v34 self-test
        run: python admin_panel_runtime_v34.py --self-test
