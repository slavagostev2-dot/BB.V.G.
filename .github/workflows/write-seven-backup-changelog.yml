name: Write seven backup changelog

on:
  pull_request:
    types: [synchronize]
    paths:
      - "tests/test_actions_security.py"

permissions:
  contents: write

jobs:
  write:
    if: ${{ github.head_ref == 'seven-backup-finalize' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout authoritative main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 1

      - name: Add changelog entry
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("docs/PROJECT_CHANGELOG_RU.md")
          text = path.read_text(encoding="utf-8")
          heading = "## 2026-07-22 — Ротация хранит семь backup-веток"
          if heading not in text:
              marker = "---\n\n"
              entry = (
                  "## 2026-07-22 — Ротация хранит семь backup-веток\n\n"
                  "Лимит обычных веток `backup/*` увеличен с трёх до семи. "
                  "`backup_rotation.py` и `.github/workflows/bot-state-backup.yml` "
                  "используют единый fail-closed контракт `KEEP_BACKUPS=7`: только что "
                  "созданная ветка сохраняется всегда, а удаление начинается только при "
                  "появлении восьмой проверенной backup-ветки.\n\n"
                  "Self-test проверяет переход `8 → 7`, идемпотентный повтор, dry-run "
                  "и запрет удаления при ошибке ancestry. Security-contract отдельно "
                  "фиксирует значение 7 в Python-модуле и workflow. Production-инвентаризация "
                  "обнаружила четыре backup-ветки; все четыре являются безопасными предками "
                  "`main`, поэтому сохранены и удаление не потребовалось.\n\n"
                  "Во время проверки удалён устаревший временный workflow "
                  "`participation-hotfix-temp.yml`, конфликтовавший с действующим "
                  "`notification_button_recovery.py`.\n\n"
                  "**Pre-update rollback:** `backup/2026-07-22-after-referral-wheel-label`.\n\n"
              )
              if marker not in text:
                  raise SystemExit("PROJECT_CHANGELOG_RU.md marker not found")
              path.write_text(text.replace(marker, marker + entry, 1), encoding="utf-8")
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/PROJECT_CHANGELOG_RU.md
          git commit -m "Задокументировать хранение семи backup-веток"
          for attempt in 1 2 3 4; do
            if git push origin HEAD:main; then
              exit 0
            fi
            git pull --rebase origin main || { git rebase --abort || true; exit 1; }
          done
          exit 1
