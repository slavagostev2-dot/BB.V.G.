name: Release xFLARXx Control Center update

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/release-xflarxx-control-center.yml"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Publish release marker and remove temporary workflow
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          target_sha="$(git rev-parse HEAD)"
          printf '%s xflarxx-account-access-cleanup %s\n' \
            "$target_sha" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            > control_center_release.txt
          rm -f .github/workflows/release-xflarxx-control-center.yml
          git add control_center_release.txt .github/workflows/release-xflarxx-control-center.yml
          git commit -m "Release xFLARXx account and access cleanup"
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then exit 0; fi
            git pull --rebase origin main
            sleep $((attempt * 2))
          done
          exit 1
