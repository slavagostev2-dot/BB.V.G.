name: Apply xFLARXx account and access cleanup

on:
  push:
    branches: [feature/xflarxx-account-access-cleanup]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout exact branch commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Apply repository changes
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one marker, found {count}: {old[:120]!r}")
              target.write_text(text.replace(old, new, 1), encoding="utf-8")

          def insert_after(path: str, marker: str, addition: str) -> None:
              target = Path(path)
              text = target.read_text(encoding="utf-8")
              if addition.strip() in text:
                  return
              count = text.count(marker)
              if count != 1:
                  raise SystemExit(f"{path}: expected one insertion marker, found {count}")
              target.write_text(text.replace(marker, marker + addition, 1), encoding="utf-8")

          # Generic additional BetBoom account runner and standalone delivery.
          path = Path("betboom_account_participation.py")
          text = path.read_text(encoding="utf-8")
