          addition = '''def _pending_standalone_account_events(
    state: dict[str, Any], field: str
) -> list[tuple[str, dict[str, Any]]]:
    events = state.get("auto_participation_events")
    if not isinstance(events, dict):
        return []
    values: list[tuple[str, dict[str, Any]]] = []
    for token, raw in events.items():
        if not isinstance(raw, dict):
            continue
        if str(raw.get("notification_mode") or "").casefold() != "standalone":
            continue
        if not raw.get(field):
            continue
        values.append((str(token), raw))
    values.sort(key=lambda item: str(item[1].get(field) or ""))
    return values


def _standalone_notification_enabled(user: dict[str, Any]) -> bool:
    raw = user.get("notification_preferences")
    if not isinstance(raw, dict):
        return True
    return bool(raw.get("auto_participation", True))


def _processed_outcome(record: Any) -> bool:
    return isinstance(record, dict) and bool(
        record.get("completed_at") or record.get("notified_at")
    )


def sync_standalone_account_events(panel: Any) -> dict[str, int]:
    """Deliver account-scoped outcomes to their own Telegram user."""

    snap = panel.snapshot()
    state = snap.state if isinstance(getattr(snap, "state", None), dict) else {}
    success_candidates = _pending_standalone_account_events(
        state, "bot_success_pending_at"
    )
    approved_failures = {
        token
        for token, _record in auto_participation_owner_sync.pending_failure_events(state)
    }
    failure_candidates = [
        (token, record)
        for token, record in _pending_standalone_account_events(
            state, "bot_failure_pending_at"
        )
        if token in approved_failures
    ]
    if not success_candidates and not failure_candidates:
        return {"pending": 0, "completed": 0, "failed": 0}

    active = state.get("active_wheels") if isinstance(state.get("active_wheels"), dict) else {}
    completed = 0
    failed = 0
    original_context = (
        getattr(panel, "current_chat_id", None),
        getattr(panel, "current_user_id", None),
        getattr(panel, "current_role", "guest"),
    )

    for success, candidates in ((True, success_candidates), (False, failure_candidates)):
        for token, record in candidates:
            key = str(record.get("wheel_key") or "").casefold()
            item = active.get(key)
            if not key or not isinstance(item, dict):
                failed += 1
                continue
            if str(record.get("event_token") or "") != _base_event_token(item, key):
                continue
            record_account_key = str(record.get("account_key") or "").strip()
            if not record_account_key:
                failed += 1
                continue
            try:
                _access, user_id, user, chat_id = _target_context(
                    panel, str(record.get("alert_user") or "")
                )
                outcome_key = (
                    personal_wheel_voting.wheel_event_key(key, item)
                    + f"#account:{record_account_key}"
                )
                field = (
                    "auto_participation_success_events"
                    if success
                    else "auto_participation_failure_events"
                )
                previous = _outcome_records(user, field).get(outcome_key)
                if _processed_outcome(previous):
                    continue

                panel.set_context(chat_id, user_id)
                vote_result: dict[str, Any] = {}
                original_button_updated = False
                if success:
                    raw_result = panel.mark_personal_participation(key)
                    vote_result = raw_result if isinstance(raw_result, dict) else {}
                    original_button_updated = auto_participation_owner_sync._mark_original_notification(
                        panel, chat_id, item
                    )

                referral_restricted = wheel_publications_v2.entry_is_referral_restricted(item)
                notifications_enabled = _standalone_notification_enabled(user)
                should_send = notifications_enabled and (
                    success or not referral_restricted
                )
                if should_send:
                    text_value, markup = _short_message(success, key, item, record)
                    panel.send(text_value, reply_markup=markup, chat_id=chat_id)
                now_text = datetime.now(UTC).isoformat()
                _save_outcome(
                    panel,
                    user_id,
                    field=field,
                    event_key=outcome_key,
                    payload={
                        "wheel_key": key,
                        "source_event_token": token,
                        "account_key": record_account_key,
                        "account_label": str(record.get("account_label") or ""),
                        "completed_at": now_text,
                        "notified_at": now_text if should_send else "",
                        "notification_sent": should_send,
                        "notification_policy": (
                            "sent"
                            if should_send
                            else "disabled"
                            if not notifications_enabled
                            else "referral_failure_suppressed"
                        ),
                        "referral_restricted": referral_restricted,
                        "original_button_updated": original_button_updated,
                        "vote_changed": bool(vote_result.get("changed")),
                        "vote_command_id": str(vote_result.get("vote_command_id") or ""),
                    },
                )
                completed += 1
            except Exception as exc:
                failed += 1
                print(
                    "WARNING standalone BetBoom account sync: "
                    f"wheel={key} account={record_account_key} "
                    f"{type(exc).__name__}: {exc}"
                )
            finally:
                panel.current_chat_id, panel.current_user_id, panel.current_role = (
                    original_context
                )

    return {
        "pending": len(success_candidates) + len(failure_candidates),
        "completed": completed,
        "failed": failed,
    }


