name: Finalize xFLARXx release

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/finalize-xflarxx-release.yml"

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout current main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate production integration
        env:
          BBVG_TEST_MODE: "1"
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_STATE_KEY: ${{ secrets.BOT_STATE_KEY }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
          BETBOOM_STORAGE_STATE_JSON_PART5: ${{ secrets.BETBOOM_STORAGE_STATE_JSON_PART5 }}
          BETBOOM_STORAGE_STATE_JSON_PART6: ${{ secrets.BETBOOM_STORAGE_STATE_JSON_PART6 }}
        run: |
          python -m py_compile \
            xflarxx_account_participation.py \
            xflarxx_runtime_integration.py \
            notification_button_recovery.py
          python xflarxx_account_participation.py --self-test
          python notification_button_recovery.py --self-test
          python - <<'PY'
          import xflarxx_account_participation as account
          if not account.configured():
              raise SystemExit("PART5/PART6 are not configured")
          print("PART5/PART6 configured for xFLARXx")
          PY

      - name: Run xFLARXx participation against current active wheels
        continue-on-error: true
        env:
          BETBOOM_STORAGE_STATE_JSON_PART5: ${{ secrets.BETBOOM_STORAGE_STATE_JSON_PART5 }}
          BETBOOM_STORAGE_STATE_JSON_PART6: ${{ secrets.BETBOOM_STORAGE_STATE_JSON_PART6 }}
          BETBOOM_ACCOUNT3_LABEL: "xFLARXx"
          BETBOOM_ACCOUNT3_TELEGRAM_USER: "xFLARXx"
          BETBOOM_BROWSER_CHANNEL: chrome
          BETBOOM_PARTICIPATION_TIMEOUT_MS: "30000"
        run: |
          echo '{}' > /tmp/bbvg-auto-participation-recovery.json
          python xflarxx_account_participation.py \
            --recovery-result /tmp/bbvg-auto-participation-recovery.json

      - name: Persist state, remove workflow and delete obsolete branch
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          cp state.json /tmp/bbvg-xflarxx-final-local-state.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            git show origin/main:state.json > /tmp/bbvg-xflarxx-final-remote-state.json
            python auto_participation_bot_sync.py \
              --merge-local /tmp/bbvg-xflarxx-final-local-state.json \
              --merge-remote /tmp/bbvg-xflarxx-final-remote-state.json \
              --merge-output state.json
            rm -f .github/workflows/finalize-xflarxx-release.yml
            git add -A
            git commit -m "Finalize xFLARXx release [skip ci]" || true
            if git push origin HEAD:main; then
              git push origin --delete fix/control-center-unified-notification-release || true
              exit 0
            fi
            sleep $((attempt * 2))
          done
          exit 1
