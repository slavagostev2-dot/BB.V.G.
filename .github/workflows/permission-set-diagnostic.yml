name: Diagnose workflow permission sets

on:
  pull_request:
    types: [synchronize]
    paths:
      - "tests/test_actions_security.py"

permissions:
  contents: write

jobs:
  diagnose:
    if: ${{ github.head_ref == 'seven-backup-finalize' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout authoritative main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 1

      - name: Record exact permission sets
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          own = Path(".github/workflows/permission-set-diagnostic.yml")
          own.unlink()
          from tests import test_actions_security as security

          texts = security.workflow_texts()
          actual_contents = sorted(
              name for name, text in texts.items() if "contents: write" in text
          )
          actual_actions = sorted(
              name for name, text in texts.items() if "actions: write" in text
          )
          expected_contents = sorted(security.CONTENTS_WRITE_WORKFLOWS)
          expected_actions = sorted(security.ACTIONS_WRITE_WORKFLOWS)
          payload = {
              "actual_contents_write": actual_contents,
              "expected_contents_write": expected_contents,
              "unexpected_contents_write": sorted(set(actual_contents) - set(expected_contents)),
              "missing_contents_write": sorted(set(expected_contents) - set(actual_contents)),
              "actual_actions_write": actual_actions,
              "expected_actions_write": expected_actions,
              "unexpected_actions_write": sorted(set(actual_actions) - set(expected_actions)),
              "missing_actions_write": sorted(set(expected_actions) - set(actual_actions)),
          }
          Path("workflow_permission_diagnostic.json").write_text(
              json.dumps(payload, ensure_ascii=False, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          print(json.dumps(payload, ensure_ascii=False, indent=2, sort_keys=True))
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add workflow_permission_diagnostic.json
          git commit -m "Record workflow permission diagnostic [skip ci]"
          for attempt in 1 2 3 4; do
            if git push origin HEAD:main; then
              exit 0
            fi
            git pull --rebase origin main || { git rebase --abort || true; exit 1; }
          done
          exit 1
