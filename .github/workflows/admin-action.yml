name: Queue BB V.G. admin action
run-name: BB V.G. queued action — ${{ inputs.action }}

on:
  workflow_dispatch:
    inputs:
      action:
        description: "BB V.G. action name"
        required: true
        type: string
      value:
        description: "Action target"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: bb-vg-admin-action-queue
  cancel-in-progress: false

jobs:
  enqueue:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate queue code
        run: |
          python -m py_compile admin_action_queue.py admin_action_v3.py
          python admin_action_queue.py

      - name: Queue action without touching runtime state
        env:
          ADMIN_ACTION: ${{ inputs.action }}
          ADMIN_VALUE: ${{ inputs.value }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_BRANCH: main
        run: |
          python - <<'PY'
          import os
          import admin_action_queue

          admin_action_queue.enqueue_remote(
              os.environ["ADMIN_ACTION"], os.environ["ADMIN_VALUE"]
          )
          print("Administrator action queued for the primary monitor")
          PY
