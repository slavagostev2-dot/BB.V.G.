name: Apply referral shorthand detection fix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'fix/referral-shorthand-detection-current'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact pull request head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: true
          fetch-depth: 1

      - name: Apply tested patch
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          python tools/apply_referral_shorthand_fix.py
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm -f tools/apply_referral_shorthand_fix.py .github/workflows/referral-shorthand-patch.yml
          git add wheel_publications_v2.py tests/test_chapter5_lifecycle.py AGENTS.md docs/PROJECT_CHANGELOG_RU.md
          git commit -m "Recognize referral shorthand in wheel posts"
          git push origin "HEAD:${HEAD_BRANCH}"
