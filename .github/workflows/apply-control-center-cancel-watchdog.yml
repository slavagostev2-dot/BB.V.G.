name: Apply Control Center cancellation watchdog

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/apply-control-center-cancel-watchdog.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Patch cancellation recovery
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/admin-bot.yml')
          text = path.read_text(encoding='utf-8')
          old = '''      - name: Start replacement control-center shift
        if: ${{ always() && steps.run_panel.outcome != 'skipped' && steps.run_panel.outcome != 'cancelled' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sleep 20
          gh workflow run admin-bot.yml --ref main
'''
          new = '''      - name: Start replacement control-center shift
        if: ${{ always() && steps.run_panel.outcome != 'skipped' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sleep 20
          if [[ "${{ steps.run_panel.outcome }}" == "cancelled" ]]; then
            active_other=$(gh run list \
              --workflow admin-bot.yml \
              --status in_progress \
              --limit 20 \
              --json databaseId \
              --jq '[.[] | select((.databaseId | tostring) != env.GITHUB_RUN_ID)] | length')
            queued_other=$(gh run list \
              --workflow admin-bot.yml \
              --status queued \
              --limit 20 \
              --json databaseId \
              --jq '[.[] | select((.databaseId | tostring) != env.GITHUB_RUN_ID)] | length')
            if (( active_other + queued_other > 0 )); then
              echo "A replacement Control Center run already exists; no extra dispatch is needed."
              exit 0
            fi
            echo "Cancelled Control Center has no replacement; starting a recovery run."
          fi
          gh workflow run admin-bot.yml --ref main
'''
          if text.count(old) != 1:
              raise SystemExit('Expected replacement-shift block was not found exactly once')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

          grep -F "Cancelled Control Center has no replacement" .github/workflows/admin-bot.yml
          git rm -f .github/workflows/apply-control-center-cancel-watchdog.yml

      - name: Commit patch and remove installer
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/admin-bot.yml .github/workflows/apply-control-center-cancel-watchdog.yml
          git commit -m "Recover Control Center after orphaned cancellation"
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              exit 0
            fi
            git pull --rebase origin main || { git rebase --abort || true; exit 1; }
            sleep $((attempt * 2))
          done
          exit 1
