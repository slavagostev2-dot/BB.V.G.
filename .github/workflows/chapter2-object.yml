name: Build chapter 2 Git object

on:
  push:
    branches:
      - agent/chapter2-actions-hardening

permissions:
  contents: write

concurrency:
  group: bb-vg-chapter2-object
  cancel-in-progress: false

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout candidate branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: agent/chapter2-actions-hardening
          fetch-depth: 0
          persist-credentials: false

      - name: Materialize final workflow tree
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64
          import gzip
          from pathlib import Path

          source = Path('.github/workflows/chapter2-audit.yml').read_text(encoding='utf-8')
          start = source.index("          H4sIC")
          end = source.index("\n          PAYLOAD", start)
          encoded = ''.join(line.strip() for line in source[start:end].splitlines())
          Path('/tmp/chapter2.patch').write_bytes(gzip.decompress(base64.b64decode(encoded)))
          PY
          git apply --include='.github/workflows/*.yml' /tmp/chapter2.patch
          rm -f .github/workflows/chapter2-audit.yml .github/workflows/chapter2-retry.yml .github/workflows/chapter2-nonworkflow.yml .github/workflows/chapter2-object.yml
          python - <<'PY'
          from pathlib import Path
          import re
          workflows = sorted(Path('.github/workflows').glob('*.yml'))
          assert len(workflows) == 26, len(workflows)
          for path in workflows:
              for line in path.read_text(encoding='utf-8').splitlines():
                  if 'uses: actions/' in line:
                      ref = line.split('uses:', 1)[1].split('#', 1)[0].strip()
                      assert re.fullmatch(r'actions/(?:checkout|setup-python|upload-artifact)@[0-9a-f]{40}', ref), (path, ref)
          PY

      - name: Create commit object without updating the branch
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64
          import json
          import os
          import subprocess
          from pathlib import Path

          repository = os.environ['REPOSITORY']
          parent = subprocess.check_output(['git', 'rev-parse', 'HEAD'], text=True).strip()
          base_tree = subprocess.check_output(['git', 'rev-parse', 'HEAD^{tree}'], text=True).strip()

          def gh_json(endpoint, payload):
              completed = subprocess.run(
                  ['gh', 'api', '--method', 'POST', endpoint, '--input', '-'],
                  input=json.dumps(payload), text=True, check=True, capture_output=True,
              )
              return json.loads(completed.stdout)

          entries = []
          paths = []
          for line in subprocess.check_output(['git', 'status', '--porcelain=v1'], text=True).splitlines():
              status, path = line[:2], line[3:]
              if ' -> ' in path:
                  path = path.split(' -> ', 1)[1]
              paths.append(path)
              if 'D' in status:
                  entries.append({'path': path, 'mode': '100644', 'type': 'blob', 'sha': None})
              else:
                  blob = gh_json(
                      f'repos/{repository}/git/blobs',
                      {'content': base64.b64encode(Path(path).read_bytes()).decode(), 'encoding': 'base64'},
                  )
                  entries.append({'path': path, 'mode': '100644', 'type': 'blob', 'sha': blob['sha']})

          tree = gh_json(f'repos/{repository}/git/trees', {'base_tree': base_tree, 'tree': entries})
          commit = gh_json(
              f'repos/{repository}/git/commits',
              {'message': 'Implement chapter 2 Actions hardening', 'tree': tree['sha'], 'parents': [parent]},
          )
          result = {'commit_sha': commit['sha'], 'tree_sha': tree['sha'], 'parent_sha': parent, 'changed_paths': sorted(paths)}
          Path('chapter2-object.json').write_text(json.dumps(result, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          print(json.dumps(result, sort_keys=True))
          PY

      - name: Upload commit object reference
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: chapter2-object-${{ github.run_id }}
          path: chapter2-object.json
          if-no-files-found: error
          retention-days: 1
