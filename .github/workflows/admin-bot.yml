name: BB V.G. Control Center
run-name: BB V.G. control center — recovery handoff

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/admin-bot.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bb-vg-telegram-admin-panel
  cancel-in-progress: true

jobs:
  recovery-handoff:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Stop obsolete D1-dependent control-center shifts
        run: |
          echo "Obsolete v24 shifts stopped. Bot-only v25 deployment is being merged."
