name: Retry xFLARXx cleanup with diagnostics

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/retry-xflarxx-account-access-cleanup.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      WORK_BRANCH: feature/xflarxx-account-access-cleanup-final
      TEMP_WORKFLOW: .github/workflows/retry-xflarxx-account-access-cleanup.yml
      PATCH_SCRIPT: scripts/apply_xflarxx_account_access_cleanup.py
    steps:
      - name: Checkout working branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: feature/xflarxx-account-access-cleanup-final
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Apply, validate and push
        env:
          BBVG_TEST_MODE: "1"
          BOT_TOKEN: "test-token"
          BOT_STATE_KEY: "test-state-key"
          BOT_CHAT_ID: "1"
          ADMIN_USER_ID: "1"
        shell: bash
        run: |
          set -uo pipefail
          exec > >(tee /tmp/xflarxx-cleanup.log) 2>&1
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          original_sha="$(git rev-parse HEAD)"
          stage="rebase"
          failed=0

          git fetch origin main || failed=1
          if [[ "$failed" == 0 ]]; then
            git rebase origin/main || failed=1
          fi
          if [[ "$failed" == 0 ]]; then
            stage="dependencies"
            python -m pip install -r requirements.txt || failed=1
          fi
          if [[ "$failed" == 0 ]]; then
            stage="patch"
            python "$PATCH_SCRIPT" || failed=1
          fi
          if [[ "$failed" == 0 ]]; then
            stage="cleanup"
            rm -f "$PATCH_SCRIPT" "$TEMP_WORKFLOW" || failed=1
          fi
          if [[ "$failed" == 0 ]]; then
            stage="compile"
            python -m py_compile betboom_account_participation.py auto_participation_notifications.py notification_button_recovery.py bbvg/bot/runtime.py || failed=1
          fi
          if [[ "$failed" == 0 ]]; then
            stage="self-tests"
            python betboom_account_participation.py --self-test || failed=1
            python auto_participation_notifications.py || failed=1
            python notification_button_recovery.py --self-test || failed=1
            python -m bbvg.bot.runtime --self-test || failed=1
          fi
          if [[ "$failed" == 0 ]]; then
            stage="pytest"
            pytest -q || failed=1
          fi

          if [[ "$failed" != 0 ]]; then
            echo "FAILED_STAGE=${stage}"
            git rebase --abort || true
            git reset --hard "$original_sha"
            cp /tmp/xflarxx-cleanup.log xflarxx_cleanup_failure.log
            git add xflarxx_cleanup_failure.log
            git commit -m "Record xFLARXx cleanup failure at ${stage} [skip ci]" || true
            git push --force-with-lease origin "HEAD:${WORK_BRANCH}"
            exit 1
          fi

          stage="commit"
          git add -A
          git commit -m "Подключить xFLARXx и исправить управление пользователями"
          git push --force-with-lease origin "HEAD:${WORK_BRANCH}"
          git push origin --delete fix/control-center-unified-notification-release || true

      - name: Remove retry workflow from main
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          git rebase --abort || true
          git fetch origin main
          git checkout -B cleanup-main origin/main
          if [[ -f "$TEMP_WORKFLOW" ]]; then
            git rm "$TEMP_WORKFLOW"
            git commit -m "Remove completed xFLARXx retry workflow [skip ci]"
            for attempt in 1 2 3 4 5; do
              if git push origin HEAD:main; then
                exit 0
              fi
              git pull --rebase origin main
              sleep $((attempt * 2))
            done
            exit 1
          fi
