name: Finish seven backup policy

on:
  pull_request:
    types: [synchronize]
    paths:
      - "tests/test_actions_security.py"

permissions:
  contents: write
  pull-requests: write

jobs:
  finish:
    if: ${{ github.head_ref == 'seven-backup-finalize' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Checkout authoritative main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0

      - name: Document and clean one-time validation
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          changelog_path = Path("docs/PROJECT_CHANGELOG_RU.md")
          text = changelog_path.read_text(encoding="utf-8")
          heading = "## 2026-07-22 — Ротация хранит семь backup-веток"
          if heading not in text:
              marker = "---\n\n"
              entry = '''## 2026-07-22 — Ротация хранит семь backup-веток

          Лимит обычных веток `backup/*` увеличен с трёх до семи. `backup_rotation.py` и `.github/workflows/bot-state-backup.yml` используют единый fail-closed контракт `KEEP_BACKUPS=7`: только что созданная ветка сохраняется всегда, а удаление начинается только при появлении восьмой проверенной backup-ветки.

          Self-test проверяет переход `8 → 7`, идемпотентный повтор, dry-run и запрет удаления при ошибке ancestry. Security-contract отдельно фиксирует значение 7 в Python-модуле и workflow. Production-инвентаризация на момент изменения обнаружила четыре backup-ветки; все четыре являются безопасными предками `main`, поэтому сохранены и удаление не потребовалось.

          Во время проверки удалён устаревший временный workflow `participation-hotfix-temp.yml`, который конфликтовал с действующим compatibility entrypoint `notification_button_recovery.py`.

          **Pre-update rollback:** `backup/2026-07-22-after-referral-wheel-label`.

          '''
              if marker not in text:
                  raise SystemExit("PROJECT_CHANGELOG_RU.md marker not found")
              changelog_path.write_text(
                  text.replace(marker, marker + entry, 1),
                  encoding="utf-8",
              )

          workflow_path = Path(".github/workflows/bot-state-backup.yml")
          workflow = workflow_path.read_text(encoding="utf-8")
          start_marker = "  # BEGIN SEVEN_BACKUP_PR_FINALIZE_ONCE\n"
          end_marker = "  # END SEVEN_BACKUP_PR_FINALIZE_ONCE\n"
          start = workflow.find(start_marker)
          end = workflow.find(end_marker, start)
          if start >= 0 and end >= 0:
              end += len(end_marker)
              workflow_path.write_text(
                  workflow[:start] + workflow[end:],
                  encoding="utf-8",
              )

          for relative in (
              ".github/workflows/permission-set-diagnostic.yml",
              ".github/workflows/finish-seven-backup-policy.yml",
              "backup_rotation_diagnostic.json",
              "backup_rotation_step_diagnostic.json",
              "workflow_permission_diagnostic.json",
          ):
              Path(relative).unlink(missing_ok=True)
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Задокументировать хранение семи backup-веток"
          for attempt in 1 2 3 4; do
            if git push origin HEAD:main; then
              break
            fi
            git pull --rebase origin main || { git rebase --abort || true; exit 1; }
            if (( attempt == 4 )); then
              exit 1
            fi
          done

          gh pr close "$PR_NUMBER" --repo "$REPOSITORY" --comment "Политика семи backup-веток проверена и задокументирована; техническая ветка удаляется."
          gh api --method DELETE "/repos/${REPOSITORY}/git/refs/heads/seven-backup-finalize"
