name: Diagnose docs-only pytest

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/diag-docs-pytest.yml"

permissions:
  contents: read
  issues: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      BOT_TOKEN: test-bot-token
      BOT_STATE_KEY: test-state-key
      BOT_CHAT_ID: "1"
      ADMIN_USER_ID: "1"
      BBVG_TEST_MODE: "1"
      TELEGRAM_WEB_DOMAIN: telegram.me
      FINAL_REMINDER_BEFORE_MINUTES: "5"
      ACTIVE_REMOVE_GRACE_MINUTES: "0"
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Capture first pytest failure
        shell: bash
        run: |
          set +e
          python -m pytest -q --maxfail=1 > /tmp/pytest.log 2>&1
          echo "$?" > /tmp/pytest-status
          tail -n 120 /tmp/pytest.log > /tmp/pytest-tail
          exit 0
      - name: Publish diagnostic
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          {
            echo '## Docs-only PR first pytest result'
            echo '```text'
            cat /tmp/pytest-tail
            echo '```'
            echo "Exit status: $(cat /tmp/pytest-status)"
          } > /tmp/body.md
          gh issue edit 111 --repo slavagostev2-dot/BB.V.G. --title "Docs-only pytest diagnostic" --body-file /tmp/body.md
