name: BB V.G. current checks
run-name: BB V.G. current checks — ${{ github.event_name }}

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  current:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BOT_TOKEN: "test-bot-token"
      BOT_STATE_KEY: "test-state-key"
      BOT_CHAT_ID: "1"
      ADMIN_USER_ID: "1"
      BBVG_TEST_MODE: "1"
      TELEGRAM_WEB_DOMAIN: telegram.me
      FINAL_REMINDER_BEFORE_MINUTES: "5"
      ACTIVE_REMOVE_GRACE_MINUTES: "0"

    steps:
      - name: Checkout proposed changes
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: true
          fetch-depth: 0

      - name: Apply exact chapter 2C baseline repairs
        if: github.event_name == 'pull_request' && github.head_ref == 'cleanup/chapter-2c-legacy-panel-removal-2026-07-21'
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          changed: list[str] = []

          def replace_once(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding="utf-8")
              if new in text:
                  return
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"Expected one exact anchor in {path}, found {count}: {old!r}")
              target.write_text(text.replace(old, new, 1), encoding="utf-8")
              changed.append(path)

          replace_once(
              "monitor_data.py",
              '''    "admin_panel_status.json": {
                  "category": "diagnostic",
                  "owner": "control-center-status",
                  "schema": ("heartbeat_version", (1,)),
              },
              "bot_access.json": {''',
              '''    "admin_panel_status.json": {
                  "category": "diagnostic",
                  "owner": "control-center-status",
                  "schema": ("heartbeat_version", (1,)),
              },
              "ai_runtime_state.json": {
                  "category": "diagnostic",
                  "owner": "ai-health-inspector",
                  "schema": ("version", (1,)),
              },
              "bot_access.json": {''',
          )

          replace_once(
              "bbvg/bot/natural_language_admin.py",
              '''        ("удал", "бэкап", "delete_backups"),
                  ("удал", "backup", "delete_backups"),''',
              '''        ("удал", "бэкап", "backup", "delete_backups"),
                  ("удал", "backup", "backup", "delete_backups"),''',
          )

          replace_once(
              "tests/test_concurrency_and_ci.py",
              "self.assertEqual(len(monitor_data.JSON_STATE_CONTRACTS), 28)",
              "self.assertEqual(len(monitor_data.JSON_STATE_CONTRACTS), 29)",
          )
          replace_once(
              "tests/test_concurrency_and_ci.py",
              '''        self.assertIn("files=(bot_private_state.enc.json)", panel)
                  self.assertNotIn("notification_integrity_v2.py --prune", panel)''',
              '''        self.assertIn("git diff --quiet -- bot_private_state.enc.json", panel)
                  self.assertIn("git add bot_private_state.enc.json", panel)
                  self.assertNotIn("notification_integrity_v2.py --prune", panel)''',
          )

          replace_once(
              "tests/test_nightly_idle_policy.py",
              '''    def test_catalog_change_does_not_trigger_nightly_workflow(self) -> None:
                  workflow = (ROOT / ".github/workflows/nightly-discovery.yml").read_text(
                      encoding="utf-8"
                  )
                  push_paths = workflow.split("workflow_dispatch:", 1)[0]
                  self.assertNotIn('"source_catalog.txt"', push_paths)
                  self.assertNotIn('"public_sources.txt"', push_paths)''',
              '''    def test_catalog_change_triggers_nightly_inventory_synchronization(self) -> None:
                  workflow = (ROOT / ".github/workflows/nightly-discovery.yml").read_text(
                      encoding="utf-8"
                  )
                  push_paths = workflow.split("workflow_dispatch:", 1)[0]
                  self.assertIn('"source_catalog.txt"', push_paths)
                  self.assertIn('"public_sources.txt"', push_paths)''',
          )

          replace_once(
              "tests/test_ui_chapter4.py",
              '''            {"page:active", "page:analytics", "page:sources", "page:settings", "page:status"},''',
              '''            {"page:active", "page:analytics", "page:sources", "page:settings", "page:status", "page:profile"},''',
          )

          replace_once(
              "AGENTS.md",
              "всех 28 JSON",
              "всех 29 JSON",
          )
          replace_once(
              "AGENTS.md",
              '''| `admin_panel_status.json` | diagnostic | control-center workflow |
              | `bot_access.json` | compatibility | encrypted private state |''',
              '''| `admin_panel_status.json` | diagnostic | control-center workflow |
              | `ai_runtime_state.json` | diagnostic | AI health inspector / system health |
              | `bot_access.json` | compatibility | encrypted private state |''',
          )

          changelog = Path("docs/PROJECT_CHANGELOG_RU.md")
          changelog_text = changelog.read_text(encoding="utf-8")
          heading = "## 2026-07-21 — Глава 2C: удалена историческая цепочка Telegram-панели v25–v40"
          if heading not in changelog_text:
              anchor = "---\n\n"
              if changelog_text.count(anchor) != 1:
                  raise SystemExit("Unexpected changelog header structure")
              entry = '''## 2026-07-21 — Глава 2C: удалена историческая цепочка Telegram-панели v25–v40

После переноса production-поведения в `bbvg/bot/*` файлы
`admin_panel_runtime_v25.py`–`admin_panel_runtime_v40.py` образовывали замкнутую
историческую лестницу. Production MRO их не использовал; внешние ссылки
оставались только в устаревших preflight, CI и recovery-контрактах.

Удалены 16 versioned-файлов и 5 394 строки. `preflight.py`, Control Center
validation, current checks, recovery smoke, private-state validation и System
Health переведены на `bbvg/bot/*`, `admin_panel_v2.py` и совместимую production-
команду `admin_panel_runtime_v41.py`. Добавлен отрицательный regression-контракт,
запрещающий возврат v25–v40. Callback-данные, порядок кнопок, JSON-state и
логика колёс не изменялись.

Одновременно восстановлен зелёный baseline: `ai_runtime_state.json` внесён в
машинный ownership-inventory как 29-й JSON; исправлена четырёхполевая таблица
критических natural-language команд; тесты синхронизированы с текущим запуском
nightly discovery, профилем пользователя и CAS-сохранением encrypted state.

Pre-update backup:
`backup/before-chapter-2c-legacy-panel-removal-2026-07-21` →
`ebd84b148a8b0aa6457106d729d86925a3a77393`.
Safety-точка после физического удаления:
`safety/chapter-2c-deletion-head-2026-07-21` →
`ef2a7661b7c70b8c26951079223f4a7c990a7651`.

Откат: вернуть merge главы целиком либо восстановить pre-update backup; не
восстанавливать отдельные versioned-файлы вручную поверх нового runtime.

'''
              changelog.write_text(changelog_text.replace(anchor, anchor + entry, 1), encoding="utf-8")
              changed.append(str(changelog))

          print("Changed files:", ", ".join(changed) if changed else "none")
          PY

          if git diff --quiet; then
            echo "Exact chapter 2C repairs already applied."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add monitor_data.py bbvg/bot/natural_language_admin.py tests/test_concurrency_and_ci.py tests/test_nightly_idle_policy.py tests/test_ui_chapter4.py AGENTS.md docs/PROJECT_CHANGELOG_RU.md
          git commit -m "2C: restore green current contracts"
          git push origin "HEAD:${GITHUB_HEAD_REF}"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Validate consolidated runtime and state
        run: |
          set -euo pipefail
          for version in $(seq 25 40); do
            test ! -e "admin_panel_runtime_v${version}.py" || {
              echo "Historical panel runtime remains: admin_panel_runtime_v${version}.py" >&2
              exit 1
            }
          done
          python -m compileall -q bbvg tests
          python -m py_compile \
            admin_bot.py admin_runtime.py admin_panel_v2.py \
            admin_panel_runtime_v41.py bot_private_state.py \
            notification_integrity_v2.py privacy_retention.py security_audit.py \
            migrate_bot_private_state.py source_registry.py \
            wheel_link_lifecycle.py wheel_scenario_suite.py
          python -m bbvg.bot.storage
          python -m bbvg.bot.users
          python -m bbvg.bot.runtime --self-test
          python admin_panel_runtime_v41.py --self-test
          python bot_private_state.py
          python notification_integrity_v2.py --self-test
          python privacy_retention.py
          python migrate_bot_private_state.py --check
          python security_audit.py --self-test
          python security_audit.py --current
          python security_audit.py --history --history-output security_history_report.json

      - name: Validate chapter 2C removal contracts
        run: python -m pytest -q tests/test_current_contracts.py

      - name: Run production acceptance
        run: python tests/production_acceptance.py --section all

      - name: Validate current production boundaries
        run: |
          set -euo pipefail
          python - <<'PY'
          import inspect
          from pathlib import Path
          import notification_router
          import telegram_ui
          from bbvg.bot.runtime import TelegramPanelRuntime
          from bbvg.bot.storage import PrivateStateRuntime
          from bbvg.bot.users import UserSettingsMixin, WHEEL_NOTIFICATION_OPTIONS

          workflow = Path('.github/workflows/admin-bot.yml').read_text(encoding='utf-8')
          assert 'run: python admin_panel_runtime_v41.py' in workflow
          assert not any(
            cls.__module__.startswith('admin_panel_runtime_v')
            for cls in TelegramPanelRuntime.__mro__
          )
          assert 'Role fingerprint' in workflow or 'role fingerprint' in workflow.lower()
          assert {'wheels', 'wheel_final_reminders', 'wheel_draw_alerts'} == {
            key for key, _, _ in WHEEL_NOTIFICATION_OPTIONS
          }
          handler = inspect.getsource(UserSettingsMixin.handle_callback)
          assert 'usernotify:' in handler and 'usernotifyall:' in handler
          assert '_load_remote_bundle' in inspect.getsource(PrivateStateRuntime._save_bot_bundle)
          assert 'page:status' in {
            button['callback_data']
            for row in TelegramPanelRuntime.compact_menu_rows(False)
            for button in row
          }
          assert notification_router._bbvg_notification_integrity_v2_installed is True
          assert telegram_ui.TELEGRAM_CALLBACK_LIMIT == 64
          print('Current consolidated production boundaries validated')
          PY

      - name: Run full pytest suite
        run: python -m pytest -q
