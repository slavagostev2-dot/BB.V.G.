name: BB V.G. current checks
run-name: BB V.G. current checks — ${{ github.event_name }}

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  current:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout proposed changes
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: true
          fetch-depth: 0

      - name: Transfer chapter 2C onto current main
        if: github.event_name == 'pull_request' && github.head_ref == 'cleanup/chapter-2c-rebased-2026-07-21'
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin cleanup/chapter-2c-legacy-panel-removal-2026-07-21:refs/remotes/origin/cleanup/chapter-2c-legacy-panel-removal-2026-07-21
          python scripts/chapter2c_rebase_apply.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "2C: rebase legacy panel removal onto current main"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
