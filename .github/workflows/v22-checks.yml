name: Apply and verify chapter 3 completion

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: chapter3-completion-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout chapter branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt PyYAML

      - name: Apply correction and restore validation workflow
        shell: bash
        run: |
          set -euo pipefail
          git show HEAD^:.github/workflows/v22-checks.yml > /tmp/v22-checks-final.yml
          test -f .github/chapter3-wheel-start.patch
          git apply --check .github/chapter3-wheel-start.patch
          git apply .github/chapter3-wheel-start.patch
          python - <<'PY'
          from pathlib import Path

          workflow_root = Path('.github/workflows')
          for path in sorted(workflow_root.glob('*.yml')):
              lines = path.read_text(encoding='utf-8').splitlines()
              filtered = [
                  line
                  for line in lines
                  if not line.strip().startswith('EXPECTED_SOURCE_COUNT:')
                  and not line.strip().startswith('UNKNOWN_DEDUP_HOURS:')
              ]
              path.write_text('\n'.join(filtered) + '\n', encoding='utf-8')

          monitor_workflow = workflow_root / 'monitor.yml'
          text = monitor_workflow.read_text(encoding='utf-8')
          old = '''          primary = monitor_data.operational_sources(monitor.read_list(Path("public_sources.txt")), "fast")
          nightly = monitor_data.operational_sources(monitor.read_list(Path("source_catalog.txt")), "nightly")
          assert len({value.casefold() for value in primary + nightly}) >= 66
          assert not {value.casefold() for value in primary} & {value.casefold() for value in nightly}
          assert primary
'''
          new = '''          configured_primary = monitor.read_list(Path("public_sources.txt"))
          configured_nightly = monitor.read_list(Path("source_catalog.txt"))
          primary = monitor_data.operational_sources(configured_primary, "fast")
          nightly = monitor_data.operational_sources(configured_nightly, "nightly")
          configured_union = {value.casefold() for value in configured_primary + configured_nightly}
          operational_union = {value.casefold() for value in primary + nightly}
          assert configured_primary and configured_nightly
          assert operational_union == configured_union
          assert not {value.casefold() for value in primary} & {value.casefold() for value in nightly}
'''
          if old not in text:
              raise RuntimeError('monitor.yml historical inventory assertion marker missing')
          monitor_workflow.write_text(text.replace(old, new, 1), encoding='utf-8')

          agents = Path('AGENTS.md')
          text = agents.read_text(encoding='utf-8')
          marker = '- каждое колесо из активного списка повторно проверяется через BetBoom API на каждой итерации монитора;\n'
          contract = '- ответ BetBoom с `action_id` и `duration_min`, но без `start_dttm` означает созданную, но ещё не запущенную акцию: она не показывается в активных и без уведомления перепроверяется до появления времени старта;\n'
          if contract not in text:
              if marker not in text:
                  raise RuntimeError('AGENTS wheel contract marker missing')
              text = text.replace(marker, marker + contract, 1)
          agents.write_text(text, encoding='utf-8')

          changelog = Path('docs/PROJECT_CHANGELOG_RU.md')
          text = changelog.read_text(encoding='utf-8')
          old_reason = '**Причина:** системная диагностика продолжала использовать исторические пороги 66/77 и могла держать critical incident при живом мониторе и уже успешной транспортной проверке полного пула. Двухчасовое окно без таймера одновременно задавалось как 24 часа в monitor/workflow и исправлялось monkey-install до 2 часов. Единственный `getUpdates` consumer проверялся поиском строки, а не поведением.'
          new_reason = old_reason + ' Дополнительно BetBoom возвращал `action_id` и `duration_min` для ещё не запущенной акции без `start_dttm`, а notification-first слой ошибочно превращал такой ответ в активную карточку.'
          if old_reason in text:
              text = text.replace(old_reason, new_reason, 1)
          marker = '- frozen-time fixture доказывает открытие transport incidents при плохом снимке и их закрытие после свежего точного inventory;\n'
          bullet = '- ответ API с настроенной длительностью, но без `start_dttm`, теперь считается ещё не запущенной акцией: уведомление и активная карточка не создаются, а ранее ошибочно добавленная карточка удаляется вместе с участием и suppression-state и переводится в тихую повторную проверку;\n'
          if bullet not in text:
              if marker not in text:
                  raise RuntimeError('Chapter 3 changelog marker missing')
              text = text.replace(marker, marker + bullet, 1)
          text = text.replace(
              '**Изменённые файлы:** `monitor.py`, `wheel_link_lifecycle.py`, `system_checks.py`, `preflight.py`, `monitor_validation_v41.py`, действующие `.github/workflows/*.yml`, `tests/test_chapter3_contracts.py`, `tests/production_acceptance.py`, `AGENTS.md`, `docs/PROJECT_CHANGELOG_RU.md`.',
              '**Изменённые файлы:** `monitor.py`, `monitor_entry.py`, `bbvg_monitor_runtime.py`, `wheel_link_lifecycle.py`, `system_checks.py`, `preflight.py`, `monitor_validation_v41.py`, действующие `.github/workflows/*.yml`, `tests/test_chapter3_contracts.py`, `tests/test_lifecycle.py`, `tests/production_acceptance.py`, `AGENTS.md`, `docs/PROJECT_CHANGELOG_RU.md`.',
              1,
          )
          text = text.replace(
              '**Проверки до PR:** targeted behavioral suite — 67 tests и 9 subtests; полный pytest — 103 tests и 9 subtests;',
              '**Проверки до PR:** targeted behavioral suite — 70 tests и 9 subtests; полный pytest — 106 tests и 9 subtests;',
              1,
          )
          diagnostic = '**Диагностика ложной карточки:** run `29591043004` подтвердил ответ HTTP 200 с `action_id=878`, `duration_min=15`, `is_ended=false`, но без `start_dttm`; именно отсутствие проверки этого сочетания было причиной попадания неработающего колеса в активные.\n\n'
          rollback = '**Откат:** вернуть merge commit главы 3 целиком либо перейти на `backup/before-chapter3-contracts-health-2026-07-17`; state migration не требуется.\n'
          if diagnostic not in text:
              if rollback not in text:
                  raise RuntimeError('Chapter 3 rollback marker missing')
              text = text.replace(rollback, diagnostic + rollback, 1)
          changelog.write_text(text, encoding='utf-8')

          for path in (
              Path('.github/chapter3-wheel-start.patch'),
              Path('.github/chapter3-trigger.txt'),
              Path('.github/workflows/chapter3-audit.yml'),
          ):
              path.unlink(missing_ok=True)
          PY
          cp /tmp/v22-checks-final.yml .github/workflows/v22-checks.yml

      - name: Verify chapter 3
        shell: bash
        run: |
          set -euo pipefail
          if grep -R -n -E 'EXPECTED_SOURCE_COUNT|UNKNOWN_DEDUP_HOURS' .github/workflows; then
            echo 'Historical source or dedup workflow override remains' >&2
            exit 1
          fi
          python -m compileall -q -x '(^|/)(\.git|\.venv|state_api|docs)(/|$)' .
          python - <<'PY'
          from pathlib import Path
          import yaml
          for path in sorted(Path('.github/workflows').glob('*.yml')):
              yaml.safe_load(path.read_text(encoding='utf-8'))
          print('Workflow YAML parse passed')
          PY
          python -m pytest -q tests/test_lifecycle.py tests/test_chapter3_contracts.py tests/test_recurring_event_hotfix.py tests/test_personal_wheel_voting.py
          python -m pytest -q
          python system_checks.py --self-test
          python system_checks_v2.py --self-test
          python preflight.py
          python monitor_validation_v41.py
          python tests/production_acceptance.py --section all
          if git diff --name-only | grep -E '\.json$'; then
            echo 'Runtime JSON changed during chapter 3 validation' >&2
            exit 1
          fi

      - name: Commit verified chapter 3
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Глава 3: исключить ещё не запущенные колёса"
          for attempt in 1 2 3; do
            if git push origin "HEAD:${GITHUB_HEAD_REF}"; then
              exit 0
            fi
            git pull --rebase origin "${GITHUB_HEAD_REF}" || {
              git rebase --abort || true
              exit 1
            }
          done
          exit 1
