name: Apply wheel server generation model

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/wheel-server-generation'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Apply generation model
        run: |
          python generation_patch_part1.py
          python generation_patch_part2.py
          python generation_patch_part3.py
          python generation_patch_part4.py
          python generation_patch_part5.py

      - name: Compile generation model
        run: python -m py_compile monitor.py monitor_entry.py wheel_event_runtime.py wheel_link_lifecycle.py bbvg_monitor_runtime.py wheel_lifecycle_v2.py personal_wheel_voting.py

      - name: Run targeted generation tests
        run: python -m pytest -q tests/test_recurring_event_hotfix.py tests/test_personal_wheel_voting.py tests/test_lifecycle.py

      - name: Hide temporary workflow from repository security matrix
        run: mv .github/workflows/apply-wheel-generation.yml /tmp/apply-wheel-generation.yml

      - name: Run full pytest
        run: |
          set -o pipefail
          python -m pytest -q 2>&1 | tee generation_pytest.log

      - name: Upload pytest diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: generation-pytest-${{ github.run_id }}
          path: generation_pytest.log
          if-no-files-found: error
          retention-days: 1

      - name: Run runtime self-test
        run: python -m bbvg.bot.runtime --self-test

      - name: Run production acceptance
        run: python tests/production_acceptance.py --section all

      - name: Restore temporary workflow
        if: always()
        run: mv /tmp/apply-wheel-generation.yml .github/workflows/apply-wheel-generation.yml

      - name: Commit verified generation model
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add monitor.py monitor_entry.py wheel_event_runtime.py wheel_link_lifecycle.py bbvg_monitor_runtime.py wheel_lifecycle_v2.py personal_wheel_voting.py tests/test_recurring_event_hotfix.py tests/test_personal_wheel_voting.py AGENTS.md docs/PROJECT_CHANGELOG_RU.md
          if git diff --cached --quiet; then
            echo "Generation model already applied"
            exit 0
          fi
          git commit -m "Разделить повторные старты колеса на поколения"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
