name: Finalize VK wheel detection patch

on:
  push:
    branches:
      - fix/vk-detect-all-new-wheels
    paths:
      - ".github/workflows/apply-vk-wheel-detection-patch.yml"

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: fix/vk-detect-all-new-wheels
          fetch-depth: 0

      - name: Update monitor contract and changelog
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          workflow = Path(".github/workflows/monitor.yml")
          text = workflow.read_text(encoding="utf-8")
          anchor = '      - "notification_router.py"\n'
          block = (
              anchor
              + '      - "vk_wheel_notifications.py"\n'
              + '      - "vk_dynamic_subscribers.py"\n'
              + '      - "vk_start_welcome.py"\n'
              + '      - ".github/workflows/vk-wheel-notification.yml"\n'
              + '      - ".github/workflows/vk-start-welcome.yml"\n'
          )
          if '      - "vk_wheel_notifications.py"\n' not in text:
              if anchor not in text:
                  raise SystemExit("monitor path anchor missing")
              text = text.replace(anchor, block, 1)
          old_compile = "notification_router.py bot_notification_state.py"
          new_compile = (
              "notification_router.py vk_wheel_notifications.py "
              "vk_dynamic_subscribers.py vk_start_welcome.py bot_notification_state.py"
          )
          if new_compile not in text:
              if old_compile not in text:
                  raise SystemExit("monitor compile anchor missing")
              text = text.replace(old_compile, new_compile, 1)
          old_selftest = "          python notification_router.py\n"
          new_selftest = (
              old_selftest
              + "          python vk_wheel_notifications.py --self-test\n"
              + "          python vk_dynamic_subscribers.py --self-test\n"
          )
          if "python vk_wheel_notifications.py --self-test" not in text:
              if old_selftest not in text:
                  raise SystemExit("monitor self-test anchor missing")
              text = text.replace(old_selftest, new_selftest, 1)
          workflow.write_text(text, encoding="utf-8")

          changelog = Path("docs/PROJECT_CHANGELOG_RU.md")
          text = changelog.read_text(encoding="utf-8")
          title = "## 2026-07-21 — Исправлена доставка новых колёс во VK"
          entry = '''## 2026-07-21 — Исправлена доставка новых колёс во VK\n\nНочное колесо `CTOM05` было найдено и отправлено в Telegram, но отдельный\nworkflow VK не запускался. Причина: VK-транспорт требовал, чтобы текст\nуведомления совпал с одним из фиксированных заголовков маршрутизатора. Первое\nсообщение CTOM05 содержало корректную ссылку BetBoom, но имело другую\nформулировку, поэтому отсеивалось до обращения к VK API.\n\nVK-транспорт теперь распознаёт первичное событие по ссылке колеса и разметке\nкнопок, независимо от конкретного заголовка. Меню активных колёс, напоминания,\nуведомления о времени прокрутки и системные ошибки по-прежнему не отправляются\nво VK. Допустимые первичные формулировки приводятся к единой фазе `detected`,\nчтобы смена текста не создавала повторную рассылку. Добавлен regression-тест на\nреальный формат CTOM05 и отрицательный тест на системную ошибку со ссылкой.\n\n`monitor.yml` теперь отслеживает изменения всех production-модулей и workflow\nVK, компилирует их и запускает безопасные self-test. Новых постоянных файлов и\nмиграции состояния нет.\n\n**Pre-update backup:**\n`backup/before-vk-wheel-detection-2026-07-21` →\n`505dd34bc58efb5bb77dd0f3a2552c05604a1dfa`.\n\n**Откат:** вернуть commit изменения целиком; миграция данных не требуется.\n\n'''
          if title not in text:
              text = text.replace("---\n\n", "---\n\n" + entry, 1)
              changelog.write_text(text, encoding="utf-8")

          Path(".github/workflows/apply-vk-wheel-detection-patch.yml").unlink()
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize VK wheel delivery integration"
          git push origin HEAD:fix/vk-detect-all-new-wheels
