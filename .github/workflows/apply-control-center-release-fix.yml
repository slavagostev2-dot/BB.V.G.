name: Apply one-time Control Center release patch

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/apply-control-center-release-fix.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact main commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          persist-credentials: true
          fetch-depth: 0

      - name: Apply focused production workflow changes
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/admin-bot.yml')
          text = path.read_text(encoding='utf-8')

          marker = '      - "auto_participation_owner_sync.py"\n'
          addition = marker + '      - "auto_participation_notifications.py"\n'
          if '      - "auto_participation_notifications.py"\n' not in text:
              if text.count(marker) != 1:
                  raise SystemExit('Control Center path marker not found')
              text = text.replace(marker, addition, 1)

          if '    timeout-minutes: 45\n' not in text:
              old_timeout = '    timeout-minutes: 25\n'
              if text.count(old_timeout) != 1:
                  raise SystemExit('Control Center validation timeout marker not found')
              text = text.replace(old_timeout, '    timeout-minutes: 45\n', 1)

          old = '''          import admin_panel_runtime_v41  # noqa: F401
          from admin_panel_v2 import TelegramPanelV2
          assert getattr(
              TelegramPanelV2,
              "_bbvg_auto_participation_owner_sync_installed",
              False,
          ), "Automatic participation owner sync is not installed"
          print("Automatic participation owner sync installed")
'''
          new = '''          import notification_button_recovery  # noqa: F401
          from notification_button_recovery import TelegramPanelRuntimeButtonRecovery
          assert getattr(
              TelegramPanelRuntimeButtonRecovery,
              "_bbvg_auto_participation_owner_sync_installed",
              False,
          ), "Automatic participation owner sync is not installed"
          assert getattr(
              TelegramPanelRuntimeButtonRecovery,
              "_bbvg_auto_notification_toggle_installed",
              False,
          ), "Automatic participation notification toggle is not installed"
          assert getattr(
              notification_button_recovery.auto_participation_notifications.auto_participation_owner_sync,
              "_bbvg_unified_account_notifications_installed",
              False,
          ), "Unified two-account outcome aggregator is not installed"
          print("Unified automatic participation outcome sync installed")
'''
          if 'Unified two-account outcome aggregator is not installed' not in text:
              if text.count(old) != 1:
                  raise SystemExit('Control Center owner sync validation marker not found')
              text = text.replace(old, new, 1)

          text = text.replace(
              '"auto_participation_owner_sync": "control_center_personal_vote",',
              '"auto_participation_owner_sync": "unified_two_account_outcome",',
              1,
          )
          path.write_text(text, encoding='utf-8')
          PY

          python -m py_compile auto_participation_notifications.py notification_button_recovery.py
          python notification_button_recovery.py --self-test

          rm .github/workflows/apply-control-center-release-fix.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/workflows/admin-bot.yml
          git add -u .github/workflows/apply-control-center-release-fix.yml
          git commit -m "Harden unified notification Control Center release"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            git pull --rebase origin main || { git rebase --abort || true; exit 1; }
          done
          exit 1
