name: Capture PR159 pytest failure

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/capture-pr159-pytest.yml"

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: feature/faster-auto-participation-notifications
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Run pytest and save compact log
        env:
          BBVG_TEST_MODE: "1"
          BOT_TOKEN: "test-bot-token"
          BOT_STATE_KEY: "test-state-key"
          BOT_CHAT_ID: "1"
          ADMIN_USER_ID: "1"
        shell: bash
        run: |
          set +e
          python -m pip install -r requirements.txt >/tmp/pr159-install.log 2>&1
          pytest -q --tb=short > /tmp/pr159-pytest.log 2>&1
          code=$?
          {
            echo "pytest_exit_code=$code"
            echo
            tail -n 240 /tmp/pr159-pytest.log
          } > pr159_pytest_diagnostic.txt
          exit 0

      - name: Publish diagnostic to feature branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pr159_pytest_diagnostic.txt
          git commit -m "Record PR159 pytest diagnostic [skip ci]" || exit 0
          git push origin HEAD:feature/faster-auto-participation-notifications

      - name: Remove temporary workflow
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout -B cleanup-main origin/main
          if [[ -f .github/workflows/capture-pr159-pytest.yml ]]; then
            git rm .github/workflows/capture-pr159-pytest.yml
            git commit -m "Remove PR159 pytest diagnostic workflow [skip ci]"
            for attempt in 1 2 3 4 5; do
              if git push origin HEAD:main; then exit 0; fi
              git pull --rebase origin main
              sleep $((attempt * 2))
            done
            exit 1
          fi
