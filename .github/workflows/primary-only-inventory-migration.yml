name: One-shot primary inventory workflow migration

on:
  push:
    branches: [main]
    paths:
      - "primary_only_inventory_migration.trigger"

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0

      - name: Allow an intentionally empty nightly tier
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/monitor.yml')
          text = path.read_text(encoding='utf-8')
          old = '          assert configured_primary and configured_nightly\n'
          new = '          assert configured_primary\n'
          count = text.count(old)
          if count != 1:
              raise SystemExit(f'Expected one monitor inventory assertion, found {count}')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
          python preflight.py
          grep -F 'assert configured_primary' .github/workflows/monitor.yml
          ! grep -F 'assert configured_primary and configured_nightly' .github/workflows/monitor.yml

      - name: Commit migration and remove one-shot files
        shell: bash
        run: |
          set -euo pipefail
          rm -f primary_only_inventory_migration.trigger
          rm -f .github/workflows/primary-only-inventory-migration.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/monitor.yml primary_only_inventory_migration.trigger .github/workflows/primary-only-inventory-migration.yml
          git commit -m "Allow primary-only inventory in monitor validation"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            git pull --rebase origin main || { git rebase --abort || true; exit 1; }
          done
          exit 1
