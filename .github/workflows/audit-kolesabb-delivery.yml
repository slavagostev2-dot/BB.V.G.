name: Audit KolesaBB delivery

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout exact audit commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Audit channel posts and delivery state
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git show origin/main:state.json > /tmp/main-state.json
          git show origin/main:source_stats.json > /tmp/main-source-stats.json
          git rev-parse origin/main > /tmp/main-sha.txt
          python - <<'PY'
          from __future__ import annotations

          import json
          from collections import defaultdict
          from datetime import timezone
          from pathlib import Path
          from typing import Any

          import requests

          import monitor
          import telegram_post_links_v2

          EXPECTED = {
              "zonertg8",
              "stray",
              "neret",
              "dyrachyo",
              "koma",
              "kyzko",
              "ewc1",
              "solotg",
              "solo",
              "mael",
          }

          def identifier(link: str) -> str:
              try:
                  return monitor.wheel_identifier(link).casefold()
              except Exception:
                  return ""

          def walk(value: Any, path: tuple[str, ...] = ()):
              if isinstance(value, dict):
                  yield path, value
                  for key, child in value.items():
                      yield from walk(child, path + (str(key),))
              elif isinstance(value, list):
                  for index, child in enumerate(value):
                      yield from walk(child, path + (str(index),))

          state = json.loads(Path('/tmp/main-state.json').read_text(encoding='utf-8'))
          stats = json.loads(Path('/tmp/main-source-stats.json').read_text(encoding='utf-8'))
          main_sha = Path('/tmp/main-sha.txt').read_text(encoding='utf-8').strip()

          response = requests.get(
              'https://t.me/s/kolesaBB',
              headers={'User-Agent': monitor.USER_AGENT},
              timeout=25,
          )
          response.raise_for_status()
          posts = telegram_post_links_v2.parse_public_channel_html(
              monitor, 'kolesaBB', response.text
          )

          public_posts = []
          for message in posts:
              links = [
                  monitor.normalize_url(link)
                  for link in monitor.extract_links(message.text)
                  if identifier(link) in EXPECTED
              ]
              for link in dict.fromkeys(links):
                  public_posts.append(
                      {
                          'source': message.source,
                          'message_id': message.message_id,
                          'date_utc': message.date.astimezone(timezone.utc).isoformat(),
                          'identifier': identifier(link),
                          'url': link,
                          'notification_key': monitor.notification_key(message, link),
                      }
                  )

          state_records = []
          for path, record in walk(state):
              url = str(record.get('url') or record.get('link') or '')
              record_identifier = str(record.get('identifier') or '')
              if url:
                  record_identifier = identifier(url) or record_identifier.casefold()
              else:
                  record_identifier = record_identifier.casefold()
              if record_identifier not in EXPECTED:
                  continue
              state_records.append(
                  {
                      'path': '/'.join(path),
                      'identifier': record_identifier,
                      'source': str(record.get('source') or ''),
                      'message_id': record.get('message_id'),
                      'action_id': record.get('action_id'),
                      'status': record.get('status'),
                      'page_status': record.get('page_status'),
                      'verification_status': record.get('verification_status'),
                      'first_notified_at': record.get('first_notified_at'),
                      'last_notification_at': record.get('last_notification_at'),
                      'initial_notified': record.get('initial_notified'),
                      'notified_at': record.get('notified_at'),
                  }
              )

          seen = state.get('seen', {}) if isinstance(state.get('seen'), dict) else {}
          grouped_records = defaultdict(list)
          for record in state_records:
              grouped_records[record['identifier']].append(record)

          post_results = []
          for post in sorted(public_posts, key=lambda item: item['message_id']):
              ident = post['identifier']
              exact = [
                  record for record in grouped_records[ident]
                  if str(record.get('source') or '').casefold() == 'kolesabb'
                  and record.get('message_id') == post['message_id']
              ]
              related = grouped_records[ident]
              seen_at = seen.get(post['notification_key'])
              notified_evidence = bool(seen_at) or any(
                  record.get('first_notified_at')
                  or record.get('last_notification_at')
                  or record.get('notified_at')
                  or record.get('initial_notified') is True
                  for record in exact
              )
              post_results.append(
                  {
                      **{key: value for key, value in post.items() if key != 'notification_key'},
                      'found': bool(exact) or bool(seen_at),
                      'notified': notified_evidence,
                      'seen_at': seen_at,
                      'exact_record_paths': sorted({record['path'] for record in exact}),
                      'related_action_ids': sorted({
                          int(record['action_id']) for record in related
                          if isinstance(record.get('action_id'), int)
                      }),
                      'related_record_paths': sorted({record['path'] for record in related}),
                  }
              )

          by_identifier = defaultdict(list)
          for item in post_results:
              by_identifier[item['identifier']].append(item)

          summary = {}
          for ident in sorted(EXPECTED):
              items = by_identifier.get(ident, [])
              summary[ident] = {
                  'channel_posts_in_preview': len(items),
                  'message_ids': [item['message_id'] for item in items],
                  'found_posts': sum(1 for item in items if item['found']),
                  'notified_posts': sum(1 for item in items if item['notified']),
                  'has_any_state_record': bool(grouped_records.get(ident)),
                  'action_ids': sorted({
                      action_id
                      for item in items
                      for action_id in item['related_action_ids']
                  }),
              }

          source_stats = {}
          for path, record in walk(stats):
              joined = '/'.join(path).casefold()
              if 'kolesabb' not in joined and str(record.get('source') or '').casefold() != 'kolesabb':
                  continue
              source_stats['/'.join(path)] = {
                  key: value
                  for key, value in record.items()
                  if key in {
                      'source', 'checks', 'posts', 'wheel_posts', 'notifications',
                      'notifications_sent', 'last_message_id', 'last_checked_at',
                      'last_success_at', 'last_wheel_at', 'quality_score'
                  }
              }

          output = {
              'main_sha': main_sha,
              'channel_http_status': response.status_code,
              'channel_preview_post_count': len(posts),
              'expected_identifiers': sorted(EXPECTED),
              'matched_channel_posts': post_results,
              'summary': summary,
              'source_stats': source_stats,
          }
          Path('kolesabb-delivery-audit.json').write_text(
              json.dumps(output, ensure_ascii=False, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          print(json.dumps(output, ensure_ascii=False, indent=2, sort_keys=True))
          PY

      - name: Upload audit result
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: kolesabb-delivery-audit-${{ github.run_id }}
          path: kolesabb-delivery-audit.json
          retention-days: 1
          if-no-files-found: error
