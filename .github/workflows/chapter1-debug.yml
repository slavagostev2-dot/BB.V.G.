name: Prepare chapter 1 migration

on:
  push:
    branches:
      - chapter1-pii-hardening
    paths:
      - ".github/workflows/chapter1-debug.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: chapter1-pii-hardening
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run preparation and capture sanitized diagnostics
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import re
          import subprocess
          import textwrap

          workflow = Path('.github/workflows/bot-state-backup.yml').read_text(encoding='utf-8')
          start_marker = "          python - <<'PY'\n"
          end_marker = "\n          PY\n"
          start = workflow.index(start_marker) + len(start_marker)
          end = workflow.index(end_marker, start)
          Path('/tmp/apply_chapter1.py').write_text(
              textwrap.dedent(workflow[start:end]), encoding='utf-8'
          )

          commands = [
              ['python', '/tmp/apply_chapter1.py'],
              ['python', 'security_audit.py', '--migrate-current'],
              ['python', '-m', 'py_compile', 'security_audit.py', 'wheel_lifecycle_v2.py', 'monitor_data.py', 'admin_action_v3.py', 'admin_panel_runtime_v5.py'],
              ['python', 'security_audit.py', '--self-test'],
              ['python', 'security_audit.py', '--current'],
              ['python', '-m', 'pytest', '-q', 'tests/test_lifecycle.py', 'tests/test_personal_wheel_voting.py'],
          ]
          rows = []
          for command in commands:
              result = subprocess.run(command, text=True, stdout=subprocess.PIPE, stderr=subprocess.STDOUT)
              output = result.stdout[-12000:]
              output = re.sub(r'(?<![A-Za-z0-9_])\d{7,15}(?![A-Za-z0-9_])', '<numeric-id>', output)
              rows.append({'command': command, 'returncode': result.returncode, 'output_tail': output})
              if result.returncode:
                  break
          Path('.chapter1-diagnostic.json').write_text(
              json.dumps({'results': rows}, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )
          PY

      - name: Publish diagnostic marker
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .chapter1-diagnostic.json
          git commit -m "Record chapter 1 preparation diagnostic [skip ci]"
          git push origin HEAD:chapter1-pii-hardening
