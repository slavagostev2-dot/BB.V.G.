name: Sync generation branch with main

on:
  push:
    branches:
      - agent/wheel-server-generation-followup

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: agent/wheel-server-generation-followup
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Merge current main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge --no-edit origin/main
      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt
      - name: Hide temporary workflow
        run: mv .github/workflows/sync-generation-main.yml /tmp/sync-generation-main.yml
      - name: Compile
        run: python -m py_compile monitor.py monitor_entry.py wheel_event_runtime.py wheel_link_lifecycle.py bbvg_monitor_runtime.py wheel_lifecycle_v2.py personal_wheel_voting.py
      - name: Targeted tests
        run: python -m pytest -q tests/test_recurring_event_hotfix.py tests/test_personal_wheel_voting.py tests/test_lifecycle.py
      - name: Full pytest
        run: python -m pytest -q
      - name: Production acceptance
        run: python tests/production_acceptance.py --section all
      - name: Restore temporary workflow
        if: always()
        run: mv /tmp/sync-generation-main.yml .github/workflows/sync-generation-main.yml
      - name: Push verified merge
        run: |
          git status --short
          git push origin HEAD:agent/wheel-server-generation-followup
