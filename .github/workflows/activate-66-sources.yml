name: Activate all 66 telegram.me sources

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/activate-66-sources.yml"
      - "source_transport_smoke.py"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: bb-vg-activate-66-sources
  cancel-in-progress: true

jobs:
  activate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate permanent source policy
        env:
          TELEGRAM_WEB_DOMAIN: telegram.me
          EXPECTED_SOURCE_COUNT: "66"
        run: |
          python preflight.py
          python -m py_compile source_transport_smoke.py telegram_transport.py bbvg_monitor_main.py

      - name: Check all 66 sources through telegram.me
        id: smoke
        continue-on-error: true
        env:
          TELEGRAM_WEB_DOMAIN: telegram.me
          REQUEST_TIMEOUT_SECONDS: "15"
          MAX_WORKERS: "16"
          TRANSPORT_BATCH_ATTEMPTS: "3"
          BOT_FEEDBACK_ENABLED: "false"
          AUTO_RUN: "false"
          MANUAL_RUN: "false"
        run: python source_transport_smoke.py

      - name: Save live source transport result
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          test -f source_transport_state.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add source_transport_state.json
          git commit -m "Record live 66-source telegram.me check [skip ci]" || true
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            if ! git pull --rebase origin main; then
              git rebase --abort || true
              exit 1
            fi
          done
          exit 1

      - name: Replace continuous monitor with 66-source runtime
        if: steps.smoke.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run monitor.yml --ref main -f continuous=true -f replace=true

      - name: Fail if live source accounting failed
        if: steps.smoke.outcome != 'success'
        run: exit 1
