name: Replace legacy monitor process
run-name: Replace legacy monitor with BB V.G.

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/stop-legacy-monitor.yml"
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: betboom-wheel-monitor-continuous
  cancel-in-progress: true

jobs:
  replace-legacy:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Confirm legacy shutdown
        run: echo "Legacy monitor stopped; starting BB V.G. runtime."

      - name: Start continuous BB V.G. monitor
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run monitor.yml --repo "${GITHUB_REPOSITORY}" --ref main -f continuous=true
