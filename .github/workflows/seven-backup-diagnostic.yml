name: Diagnose seven backup retention

on:
  pull_request:
    types: [synchronize, reopened]
    paths:
      - "tests/test_actions_security.py"

permissions:
  contents: write

jobs:
  diagnose:
    if: ${{ github.head_ref == 'seven-backup-finalize' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
    steps:
      - name: Checkout authoritative main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Record exact backup inventory
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          import backup_rotation

          repository = os.environ["REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          client = backup_rotation.HttpGitHubClient(repository, token)
          repository_info = client.request("GET", "")
          default_branch = str(repository_info.get("default_branch") or "")
          default_ref = client.request("GET", backup_rotation.ref_path(default_branch))
          default_sha = str((default_ref.get("object") or {}).get("sha") or "")
          records = backup_rotation.load_records(client)
          plan = backup_rotation.plan_rotation(records, keep_count=7)

          rows = []
          for record in records:
              compare = client.request("GET", f"/compare/{record.sha}...{default_sha}")
              merge_base = str((compare.get("merge_base_commit") or {}).get("sha") or "")
              safe = (
                  compare.get("status") in {"ahead", "identical"}
                  and merge_base == record.sha
              )
              rows.append(
                  {
                      "name": record.name,
                      "sha": record.sha,
                      "committed_at": record.committed_at,
                      "compare_status": compare.get("status"),
                      "merge_base_sha": merge_base,
                      "safe_ancestor": safe,
                      "planned_action": (
                          "keep"
                          if record in plan.retained
                          else "delete"
                      ),
                  }
              )

          payload = {
              "generated_at": datetime.now(timezone.utc).isoformat(),
              "repository": repository,
              "default_branch": default_branch,
              "default_sha": default_sha,
              "policy_keep_count": 7,
              "backup_count": len(records),
              "safe_count": sum(1 for row in rows if row["safe_ancestor"]),
              "unsafe_count": sum(1 for row in rows if not row["safe_ancestor"]),
              "retained": [record.name for record in plan.retained],
              "obsolete": [record.name for record in plan.obsolete],
              "records": sorted(rows, key=lambda row: row["committed_at"], reverse=True),
          }
          with open("backup_rotation_diagnostic.json", "w", encoding="utf-8") as stream:
              json.dump(payload, stream, ensure_ascii=False, indent=2, sort_keys=True)
              stream.write("\n")
          print(json.dumps(payload, ensure_ascii=False, indent=2, sort_keys=True))
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backup_rotation_diagnostic.json
          git commit -m "Record seven-backup rotation diagnostic [skip ci]"
          for attempt in 1 2 3 4; do
            if git push origin HEAD:main; then
              exit 0
            fi
            git pull --rebase origin main || { git rebase --abort || true; exit 1; }
          done
          exit 1
