name: Run xFLARXx account and access cleanup

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Apply embedded repository patch
        run: |
          python - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/apply-xflarxx-account-access-cleanup.yml')
          text = workflow.read_text(encoding='utf-8')
          start_marker = "          python - <<'PY'\n"
          end_marker = "          PY\n\n      - name: Install dependencies"
          if text.count(start_marker) != 1 or text.count(end_marker) != 1:
              raise SystemExit('Embedded patch markers are invalid')
          script = text.split(start_marker, 1)[1].split(end_marker, 1)[0]
          lines = script.splitlines()
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines)
          exec(compile(script, str(workflow), 'exec'), {})
          PY

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate changes
        env:
          BBVG_TEST_MODE: "1"
          BOT_TOKEN: "test-token"
          BOT_STATE_KEY: "test-state-key"
          BOT_CHAT_ID: "1"
          ADMIN_USER_ID: "1"
        run: |
          set -euo pipefail
          python -m py_compile \
            betboom_account_participation.py \
            auto_participation_notifications.py \
            notification_button_recovery.py \
            bbvg/bot/runtime.py \
            admin_panel_runtime_v41.py
          python betboom_account_participation.py --self-test
          python auto_participation_notifications.py
          python notification_button_recovery.py --self-test
          python -m bbvg.bot.runtime --self-test
          python admin_panel_runtime_v41.py --self-test
          pytest -q

      - name: Commit result and delete obsolete branch
        run: |
          set -euo pipefail
          rm -f \
            .github/workflows/apply-xflarxx-account-access-cleanup.yml \
            .github/workflows/run-xflarxx-account-access-cleanup-pr.yml \
            apply_xflarxx.trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Подключить xFLARXx и исправить управление пользователями"
          git push origin HEAD:feature/xflarxx-account-access-cleanup
          git push origin --delete fix/control-center-unified-notification-release || true
