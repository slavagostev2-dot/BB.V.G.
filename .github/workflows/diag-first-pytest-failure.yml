name: Diagnose first pytest failure

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: fix/nla-critical-pattern-tuples
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Show first pytest failure
        env:
          BOT_TOKEN: test-bot-token
          BOT_STATE_KEY: test-state-key
          BOT_CHAT_ID: "1"
          ADMIN_USER_ID: "1"
          BBVG_TEST_MODE: "1"
          TELEGRAM_WEB_DOMAIN: telegram.me
          FINAL_REMINDER_BEFORE_MINUTES: "5"
          ACTIVE_REMOVE_GRACE_MINUTES: "0"
        run: python -m pytest -q --maxfail=1
